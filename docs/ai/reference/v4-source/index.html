.ua-card pre .c { color: var(--mute); }

/* Empty state */
.ext-empty {
  margin-top: 18px;
  border: 1px dashed var(--line); border-radius: var(--r-md);
  background: var(--glass-2);
  padding: 44px 28px;
  text-align: center;
  color: var(--ink-3);
  font-size: 13px;
  line-height: 1.55;
}
.ext-empty h4 { font: 600 15px/1.2 var(--font-display); color: var(--ink); margin-bottom: 6px; }
.ext-empty .ic {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--glass-3); color: var(--ink-3);
  border: 1px dashed var(--line);
  display: grid; place-items: center; margin: 0 auto 12px;
}
.ext-empty .ic svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width: 1200px) {
  :root { --rail-w: 220px; --dock-w: 320px; }
  .dept-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  .kpi-strip .kpi:nth-child(2) { border-right: 0; }
  .home { grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; padding: 26px 28px 80px; }
  .action-grid { grid-template-columns: repeat(3, 1fr); }
  .action-card.featured { grid-column: span 3; }
}
@media (max-width: 960px) {
  :root { --rail-w: 0; --dock-w: 0; --topbar-h: 52px; }
  .app { grid-template-columns: 1fr; }
  .rail {
    position: fixed; top: 52px; bottom: 0; left: 0;
    width: 280px; z-index: 80;
    transform: translateX(-105%);
    transition: transform .25s var(--ease);
    border-right: 1px solid var(--line);
    background: var(--bg);
  }
  .rail.on { transform: translateX(0); }
  .topbar { grid-template-columns: auto 1fr auto; }
  .brand { border-right: 0; padding: 0 12px; }
  .dash { padding: 18px 16px 100px; }
  .home { grid-template-columns: 1fr; padding: 18px 16px 100px; gap: 22px; }
  .home-side { order: 2; }
  .action-grid { grid-template-columns: repeat(2, 1fr); }
  .action-card.featured { grid-column: span 2; }
  .home-hero { padding: 22px 20px 18px; }
  .home-hero h1 { font-size: 24px; }
  .home-projects { grid-template-columns: 1fr; }
  .agent-page { padding: 18px 16px 100px; }
  .agent-head { grid-template-columns: 64px 1fr; }
  .agent-head .av-big { width: 64px; height: 64px; border-radius: 16px; font-size: 22px; }
  .agent-head .now { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line-soft); padding: 12px 0 0; min-width: 0; }
  .agent-cols { grid-template-columns: 1fr; }
  .proj-app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  .dock {
    border-top: 1px solid var(--line);
    max-height: 50vh;
  }
  .proj-main { border-right: 0; }
  .proj-card { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
  .proj-card .titleblock { grid-column: 1; grid-row: 1; }
  .proj-card .right-stack {
    grid-column: 1; grid-row: 2;
    justify-self: stretch;
    justify-content: space-between;
    grid-template-columns: 1fr auto;
  }
  .stage-bar { grid-column: 1; grid-row: 3; grid-template-columns: repeat(2, 1fr); }
  .settings { grid-template-columns: 1fr; }
  .settings-rail { border-right: 0; border-bottom: 1px solid var(--line-soft); padding: 12px 14px; display: flex; gap: 4px; overflow-x: auto; }
  .settings-rail h4 { display: none; }
  .settings-rail a { white-space: nowrap; padding: 7px 12px; }
  .settings-body { padding: 22px 16px 80px; }
  .field { grid-template-columns: 1fr; gap: 10px; }
  .role-grid { grid-template-columns: 1fr; }
  .kind-grid { grid-template-columns: 1fr; }
  .ext { padding: 18px 16px 100px; }
  .ext-head { grid-template-columns: 1fr; align-items: start; }
  .ext-head .acts { flex-wrap: wrap; }
  .ext-kpi { grid-template-columns: repeat(2, 1fr); padding: 12px 0; gap: 14px 0; }
  .ext-kpi .it { padding: 8px 16px; border-right: 0; border-bottom: 1px solid var(--line-soft); }
  .ext-kpi .it:nth-last-child(-n+2) { border-bottom: 0; }
  .ext-tabs { grid-auto-columns: minmax(150px, 1fr); overflow-x: auto; padding: 4px; scrollbar-width: thin; }
  .ext-tab { padding: 9px 12px; }
  .plugin-grid { grid-template-columns: 1fr; }
  .src-grid { grid-template-columns: 1fr; }
  .conn-grid { grid-template-columns: 1fr; }
  .ua-grid { grid-template-columns: 1fr; }
  .mcp-row { grid-template-columns: 22px 1fr auto auto; row-gap: 6px; gap: 12px; padding: 12px 14px; }
  .mcp-row .count { grid-column: 2 / -1; }
  .mobile-only { display: flex !important; }
  .desktop-only { display: none !important; }
}
@media (max-width: 560px) {
  .dept-grid { grid-template-columns: 1fr; }
  .kpi-strip { grid-template-columns: 1fr 1fr; }
  .stage-bar { grid-template-columns: 1fr; }
  .action-grid { grid-template-columns: 1fr; }
  .action-card.featured { grid-column: span 1; grid-template-columns: 1fr; }
  .action-card.featured .ic-tile { grid-row: auto; }
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .home-kpis .it:nth-child(2) { border-right: 0; }
  .home-hero h1 { font-size: 21px; }
  .preview-frame { height: 180px; }
  .crumbs { padding: 0 10px; font-size: 12px; }
  .crumbs .ws { padding: 4px 8px 4px 4px; }
  .top-actions { padding: 0 8px; }
  .top-actions .t-btn .label { display: none; }
}

.mobile-only { display: none; }
.menu-btn {
  width: 36px; height: 36px; border-radius: 8px;
  display: none; place-items: center;
  color: var(--ink-2);
}

.dock-collapse-btn { display: none; }
@media (max-width: 960px) {
  .dock-collapse-btn {
    display: flex; align-items: center; gap: 6px;
    position: sticky; top: 0;
    padding: 10px 14px;
    background: var(--glass-3);
    border-bottom: 1px solid var(--line-soft);
    font: 11px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--mute);
  }
}

/* Scrollbars */
.view-scroll::-webkit-scrollbar, .dock-scroll::-webkit-scrollbar, .pane-scroll::-webkit-scrollbar, .chat-scroll::-webkit-scrollbar, .rail::-webkit-scrollbar, .settings-body::-webkit-scrollbar, .mention-pop .list::-webkit-scrollbar { width: 10px; }
.view-scroll::-webkit-scrollbar-track, .dock-scroll::-webkit-scrollbar-track, .pane-scroll::-webkit-scrollbar-track, .chat-scroll::-webkit-scrollbar-track, .rail::-webkit-scrollbar-track, .settings-body::-webkit-scrollbar-track, .mention-pop .list::-webkit-scrollbar-track { background: transparent; }
.view-scroll::-webkit-scrollbar-thumb, .dock-scroll::-webkit-scrollbar-thumb, .pane-scroll::-webkit-scrollbar-thumb, .chat-scroll::-webkit-scrollbar-thumb, .rail::-webkit-scrollbar-thumb, .settings-body::-webkit-scrollbar-thumb, .mention-pop .list::-webkit-scrollbar-thumb {
  background: var(--line);
  border-radius: 999px;
  border: 3px solid transparent;
  background-clip: padding-box;
}
.view-scroll::-webkit-scrollbar-thumb:hover, .dock-scroll::-webkit-scrollbar-thumb:hover, .pane-scroll::-webkit-scrollbar-thumb:hover, .chat-scroll::-webkit-scrollbar-thumb:hover { background: var(--line-strong); background-clip: padding-box; }

/* Tiny icons (inline SVG strokes) */
.ic { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Avatar palette */
.av.h-aria   { background: linear-gradient(135deg, oklch(64% 0.14 35), oklch(72% 0.16 50)); }
.av.h-cypher { background: linear-gradient(135deg, oklch(60% 0.14 200), oklch(58% 0.16 235)); }
.av.h-foster { background: linear-gradient(135deg, oklch(58% 0.16 285), oklch(64% 0.18 305)); }
.av.h-lex    { background: linear-gradient(135deg, oklch(56% 0.14 145), oklch(64% 0.16 165)); }
.av.h-marlow { background: linear-gradient(135deg, oklch(58% 0.14 95), oklch(64% 0.16 115)); }
.av.h-atlas  { background: linear-gradient(135deg, oklch(60% 0.14 250), oklch(58% 0.16 275)); }
.av.h-ridge  { background: linear-gradient(135deg, oklch(58% 0.16 25), oklch(54% 0.18 5)); }
.av.h-mast   { background: linear-gradient(135deg, oklch(54% 0.16 245), oklch(50% 0.18 265)); }
.av.h-ink    { background: linear-gradient(135deg, oklch(56% 0.18 320), oklch(60% 0.18 340)); }
.av.h-plume  { background: linear-gradient(135deg, oklch(60% 0.16 175), oklch(58% 0.16 195)); }
.av.h-quill  { background: linear-gradient(135deg, oklch(54% 0.14 65), oklch(60% 0.16 85)); }
.av.h-sage   { background: linear-gradient(135deg, oklch(54% 0.14 120), oklch(58% 0.14 140)); }
.av.h-vault  { background: linear-gradient(135deg, oklch(52% 0.16 30), oklch(56% 0.14 50)); }
.av.h-boss   { background: linear-gradient(135deg, oklch(34% 0.04 250), oklch(22% 0.02 245)); }
.av.h-opt    { background: linear-gradient(135deg, var(--opt), var(--opt-2)); }

/* =========================================================
   PROJECT WORKBENCH — chat column + canvas column
   ========================================================= */
:root { --chat-w: 440px; --canvas-bar-h: 46px; }

.proj-app.workbench {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  height: 100%;
  min-height: 0;
}
.proj-app.workbench .proj-card { margin: 14px 22px 0; }
.proj-app.workbench .work-grid {
  display: grid;
  grid-template-columns: var(--chat-w) 1fr;
  min-height: 0;
  margin-top: 14px;
  border-top: 1px solid var(--line-soft);
}

.chat-col {
  display: grid;
  grid-template-rows: 1fr auto;
  min-height: 0;
  border-right: 1px solid var(--line-soft);
  background: var(--bg);
}
.chat-col .chat-scroll { overflow-y: auto; min-height: 0; }
.chat-col .timeline { padding: 18px 20px 18px; }

/* Agent execution group — collapsed action rows */
.exec-group {
  display: grid; gap: 6px;
  padding: 12px 14px;
  border: 1px solid var(--line-soft);
  border-radius: 12px;
  background: var(--glass-3);
  margin-top: 8px;
}
.exec-group > .head {
  display: flex; align-items: center; gap: 8px;
  font: 11px/1 var(--font-mono); color: var(--mute);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 4px;
}
.exec-group > .head .by {
  display: inline-flex; align-items: center; gap: 6px;
  text-transform: none; letter-spacing: 0.04em;
  color: var(--ink-2);
}
.exec-group > .head .by .av { width: 18px; height: 18px; border-radius: 5px; font-size: 9px; }

.exec-row {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  background: var(--glass-2);
  font: 13px/1.2 var(--font-display);
  color: var(--ink-2);
  cursor: pointer;
  transition: background .15s ease, border-color .15s ease, transform .15s ease;
}
.exec-row:hover { background: var(--glass); border-color: var(--line); }
.exec-row .ic-wrap {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--glass-3);
  color: var(--mute);
  border: 1px solid var(--line-soft);
}
.exec-row .ic-wrap .ic { width: 12px; height: 12px; stroke-width: 1.6; }
.exec-row .ttl {
  display: flex; align-items: baseline; gap: 8px; min-width: 0;
  font: 500 13px/1.2 var(--font-display); color: var(--ink);
}
.exec-row .ttl .x { color: var(--mute); font: 12px/1 var(--font-mono); }
.exec-row .tail {
  display: inline-flex; align-items: center; gap: 8px;
  font: 11px/1 var(--font-mono); color: var(--mute);
  letter-spacing: 0.06em;
}
.exec-row .tail .ok-tag { color: var(--ok); }
.exec-row .tail .chev { color: var(--mute-2); transition: transform .15s ease; }
.exec-row.open .tail .chev { transform: rotate(90deg); }
.exec-row.running {
  background: oklch(95% 0.05 145 / 0.5);
  border-color: oklch(72% 0.16 145 / 0.35);
}
[data-theme="dark"] .exec-row.running {
  background: oklch(36% 0.10 145 / 0.16);
  border-color: oklch(60% 0.18 145 / 0.4);
}
.exec-row.running .ic-wrap {
  color: var(--ok);
  background: oklch(80% 0.13 145 / 0.18);
  border-color: oklch(72% 0.16 145 / 0.35);
}
.exec-row.running .ic-wrap .ic { animation: spin 1.4s linear infinite; }
.exec-row.running .tail .elapsed { color: var(--ok); }
@keyframes spin { to { transform: rotate(360deg); } }

.exec-row .detail {
  display: none;
  grid-column: 1 / -1;
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px dashed var(--line-soft);
  gap: 4px;
  font: 12px/1.6 var(--font-mono);
  color: var(--mute);
}
.exec-row.open .detail { display: grid; }
.exec-row .detail .ln {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  color: var(--ink-2);
}
.exec-row .detail .ln .arg { color: var(--mute); font-size: 11.5px; }
.exec-row .detail .ln .v { color: var(--accent); font-size: 11.5px; }

/* Composer */
.composer {
  position: relative;
  display: grid;
  gap: 10px;
  padding: 12px 16px 14px;
  border-top: 1px solid var(--line);
  background: var(--glass-3);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
}
.composer-field {
  position: relative;
  display: grid;
  grid-template-rows: 1fr auto;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface);
  transition: border-color .15s ease, box-shadow .15s ease;
}
.composer-field:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.composer-field textarea {
  resize: none;
  border: 0;
  outline: 0;
  background: transparent;
  font: 14px/1.55 var(--font-display);
  color: var(--ink);
  padding: 12px 14px 6px;
  min-height: 72px;
  max-height: 200px;
  width: 100%;
  font-family: inherit;
}
.composer-field textarea::placeholder { color: var(--mute-2); }

.composer-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 6px 8px;
}
.composer-bar .icon-btn {
  display: inline-grid; place-items: center;
  width: 30px; height: 30px;
  border-radius: 8px;
  color: var(--mute);
  cursor: pointer;
  background: transparent;
  border: 0;
  position: relative;
}
.composer-bar .icon-btn:hover { background: var(--glass-2); color: var(--ink); }
.composer-bar .icon-btn.on { background: var(--accent-soft); color: var(--accent); }
.composer-bar .icon-btn .ic { width: 15px; height: 15px; }
.composer-bar .at { font: 700 15px/1 var(--font-mono); letter-spacing: 0; }
.composer-bar .spring { flex: 1; }
.composer-bar .kbd {
  font: 10.5px/1 var(--font-mono);
  color: var(--mute-2);
  letter-spacing: 0.06em;
  padding-right: 4px;
}
.composer-bar .send {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--ink);
  color: var(--bg);
  font: 600 12px/1 var(--font-mono);
  letter-spacing: 0.04em;
  cursor: pointer;
  border: 0;
  transition: background .15s ease, transform .15s ease;
}
.composer-bar .send:hover { transform: translateY(-1px); }
.composer-bar .send.stop .sq {
  width: 8px; height: 8px;
  background: currentColor;
  border-radius: 1.5px;
}
.composer-bar .send.disabled {
  background: var(--glass-2);
  color: var(--mute-2);
  cursor: default;
  pointer-events: none;
}
.composer-bar .send .ar { stroke-width: 2; }

/* Mention popup */
.mention-pop {
  position: absolute;
  bottom: calc(100% - 4px);
  left: 12px;
  width: 380px;
  max-width: calc(100% - 24px);
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface);
  box-shadow: var(--shadow-2);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 40;
}
.mention-pop.on { display: flex; }
.mention-pop .tabs {
  display: flex;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-3);
}
.mention-pop .mp-tab {
  flex: 1;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 8px;
  font: 500 12.5px/1 var(--font-display);
  color: var(--mute);
  border: 0;
  background: transparent;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.mention-pop .mp-tab .ic { width: 13px; height: 13px; }
.mention-pop .mp-tab.on {
  color: var(--ink);
  background: var(--surface);
  border-bottom-color: var(--accent);
}
.mention-pop .mp-tab:hover:not(.on) { color: var(--ink-2); }
.mention-pop .mp-tab .count {
  font: 10px/1 var(--font-mono);
  color: var(--mute);
  padding: 2px 5px;
  border-radius: 999px;
  background: var(--glass-2);
}
.mention-pop .search { padding: 8px 10px; border-bottom: 1px solid var(--line-soft); }
.mention-pop .search input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  background: var(--glass-2);
  font: 13px/1.2 var(--font-display);
  color: var(--ink);
  outline: 0;
  font-family: inherit;
}
.mention-pop .search input:focus { border-color: var(--accent); background: var(--surface); }
.mention-pop .list { max-height: 320px; overflow-y: auto; padding: 4px 4px 8px; }
.mention-pop .it {
  display: grid;
  grid-template-columns: 30px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s ease;
}
.mention-pop .it:hover { background: var(--glass-2); }
.mention-pop .it.kbd-on { background: var(--accent-soft); }
.mention-pop .it .av { width: 26px; height: 26px; border-radius: 7px; font-size: 10px; }
.mention-pop .it .pl-ic {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: var(--glass-2);
  border: 1px solid var(--line-soft);
  display: grid; place-items: center;
  color: var(--accent);
}
.mention-pop .it .pl-ic.mcp { color: oklch(60% 0.14 200); }
.mention-pop .it .pl-ic.conn { color: oklch(58% 0.14 145); }
.mention-pop .it .pl-ic .ic { width: 14px; height: 14px; }
.mention-pop .it .body { min-width: 0; }
.mention-pop .it .name {
  font: 600 13px/1.2 var(--font-display);
  color: var(--ink);
  display: flex; align-items: center; gap: 6px;
}
.mention-pop .it .name .hand,
.mention-pop .it .name .v {
  color: var(--mute);
  font: 11px/1 var(--font-mono);
  font-weight: 500;
}
.mention-pop .it .desc {
  font-size: 11.5px; color: var(--mute);
  margin-top: 2px;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.mention-pop .it .pill {
  font: 10px/1 var(--font-mono);
  color: var(--mute);
  padding: 3px 7px;
  border-radius: 999px;
  background: var(--glass-2);
  border: 1px solid var(--line-soft);
  letter-spacing: 0.04em;
}
.mention-pop .empty { padding: 24px 14px; text-align: center; color: var(--mute); font-size: 12.5px; }
.mention-pop .foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-top: 1px solid var(--line-soft);
  background: var(--glass-3);
  font: 10.5px/1 var(--font-mono);
  color: var(--mute-2);
  letter-spacing: 0.06em;
}
.mention-pop .foot .key {
  padding: 2px 5px;
  border-radius: 4px;
  background: var(--glass-2);
  border: 1px solid var(--line-soft);
  color: var(--ink-2);
}

/* Canvas col */
.canvas-col {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
  background: var(--bg);
}
.canvas-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-3);
  overflow-x: auto;
  scrollbar-width: none;
  min-height: var(--canvas-bar-h);
}
.canvas-bar::-webkit-scrollbar { display: none; }
.canvas-bar .cv-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  font: 500 12.5px/1 var(--font-display);
  color: var(--mute);
  border-radius: 7px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
}
.canvas-bar .cv-tab .count {
  font: 10px/1 var(--font-mono);
  background: var(--glass-2);
  padding: 2px 5px;
  border-radius: 999px;
  color: var(--mute);
}
.canvas-bar .cv-tab[aria-selected="true"] {
  color: var(--ink);
  background: var(--surface);
  border-color: var(--line);
}
.canvas-bar .cv-tab[aria-selected="true"] .count { background: var(--accent-soft); color: var(--accent); }
.canvas-bar .cv-tab:hover { color: var(--ink); }
.canvas-bar .sep { width: 1px; height: 22px; background: var(--line-soft); margin: 0 8px; flex: none; }
.canvas-bar .ctrl-group {
  display: inline-flex; align-items: center; gap: 1px;
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  padding: 2px;
  background: var(--surface);
  flex: none;
}
.canvas-bar .ctrl-group .ctrl {
  padding: 4px 9px;
  font: 11.5px/1 var(--font-mono);
  color: var(--mute);
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
  border: 0;
  display: inline-flex; align-items: center; gap: 5px;
}
.canvas-bar .ctrl-group .ctrl.on { background: var(--glass-2); color: var(--ink); }
.canvas-bar .ctrl-group .ctrl:hover:not(.on) { color: var(--ink-2); }
.canvas-bar .ctrl-group .ctrl .ic { width: 12px; height: 12px; }
.canvas-bar .spring { flex: 1; }
.canvas-bar .right { display: inline-flex; align-items: center; gap: 4px; color: var(--mute); flex: none; }
.canvas-bar .right .icon-btn {
  display: inline-grid; place-items: center;
  width: 30px; height: 30px;
  border-radius: 7px;
  color: var(--mute);
  cursor: pointer;
  background: transparent;
  border: 0;
}
.canvas-bar .right .icon-btn:hover { background: var(--glass-2); color: var(--ink); }
.canvas-bar .right .running-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: oklch(75% 0.13 145 / 0.16);
  color: var(--ok);
  font: 600 11px/1 var(--font-mono);
  letter-spacing: 0.06em;
}
[data-theme="dark"] .canvas-bar .right .running-pill { background: oklch(36% 0.10 145 / 0.25); }
.canvas-bar .right .running-pill .lvl {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  animation: pulse 1.4s var(--ease) infinite;
}

.canvas-body { position: relative; overflow: hidden; min-height: 0; }
.canvas-pane {
  display: none;
  height: 100%;
  min-height: 0;
}
.canvas-pane.on { display: grid; grid-template-rows: 1fr; }
.canvas-pane .pane-scroll { overflow-y: auto; padding: 14px 18px 24px; min-height: 0; }

/* Preview pane */
.preview-stage {
  height: 100%;
  display: grid;
  place-items: center;
  padding: 22px 24px;
  background:
    radial-gradient(900px 500px at 50% 0%, var(--accent-soft) 0%, transparent 60%),
    var(--bg);
}
.preview-frame-lg {
  width: min(960px, 100%);
  height: min(560px, 100%);
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--surface);
  box-shadow: var(--shadow-2);
  display: grid;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}
.preview-frame-lg .pchrome {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-3);
}
.preview-frame-lg .pchrome .dots { display: inline-flex; gap: 5px; }
.preview-frame-lg .pchrome .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mute-2); opacity: 0.45; }
.preview-frame-lg .pchrome .url {
  font: 12px/1 var(--font-mono);
  color: var(--mute);
  padding: 5px 12px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--line-soft);
  flex: 1;
  max-width: 480px;
  text-align: center;
}
.preview-frame-lg .pchrome .acts { display: flex; gap: 2px; }
.preview-frame-lg .pchrome .acts .ic-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: inline-grid; place-items: center;
  color: var(--mute);
  cursor: pointer;
  border: 0; background: transparent;
}
.preview-frame-lg .pchrome .acts .ic-btn:hover { background: var(--glass-2); color: var(--ink); }
.preview-frame-lg .pstage {
  padding: 28px 32px 32px;
  overflow-y: auto;
  background: var(--surface);
}
.preview-frame-lg .pstage h2 {
  font: 600 21px/1.3 var(--font-display); letter-spacing: -0.01em; margin-bottom: 6px;
}
.preview-frame-lg .pstage .ledep { color: var(--mute-2); font-size: 12.5px; margin-bottom: 22px; }
.preview-frame-lg .pstage h3 {
  font: 11px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase;

}
.preview-frame-lg .row-demo { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.preview-frame-lg .row-demo .btn-demo { font-family: var(--font-display); }

/* Edit pane (code editor) */
.editor-pane {
  display: grid; grid-template-rows: auto 1fr; height: 100%; min-height: 0;
  background: var(--bg);
}
.editor-pane .files {
  display: flex; gap: 0; padding: 0 12px;

  background: var(--glass-3);

}
.editor-pane .file-tab {
  display: inline-flex; align-items: center; gap: 6px;

}
.editor-pane .file-tab.on { color: var(--ink); background: var(--surface); }
.editor-pane .file-tab .ic { width: 12px; height: 12px; }
.editor-pane .file-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 2px; opacity: 0; }
.editor-pane .file-tab.dirty .dot { opacity: 1; }
.editor-pane .editor {
  display: grid; grid-template-columns: 46px 1fr; min-height: 0;
  overflow: auto;
  font: 12.5px/1.7 var(--font-mono);
}
.editor-pane .editor .gutter {
  padding: 12px 0 12px;
  text-align: right;

  background: var(--glass-3);
  border-right: 1px solid var(--line-soft);
  user-select: none;
}
.editor-pane .editor .gutter .ln { padding: 0 12px; display: block; }
.editor-pane .editor .code {
  padding: 12px 16px 24px;
  background: var(--surface);
  white-space: pre;
  color: var(--ink);
}
.editor-pane .editor .code .ln { display: block; min-height: 1.7em; padding: 0; }
.editor-pane .editor .code .ln.add { background: oklch(85% 0.12 145 / 0.18); }
.editor-pane .editor .code .ln.del { background: oklch(80% 0.14 25 / 0.16); }
[data-theme="dark"] .editor-pane .editor .code .ln.add { background: oklch(40% 0.12 145 / 0.28); }
[data-theme="dark"] .editor-pane .editor .code .ln.del { background: oklch(40% 0.14 25 / 0.28); }
.editor-pane .editor .code .kw { color: var(--accent); }
.editor-pane .editor .code .str { color: oklch(50% 0.16 145); }
.editor-pane .editor .code .com { color: var(--mute-2); font-style: italic; }
[data-theme="dark"] .editor-pane .editor .code .str { color: oklch(68% 0.18 145); }

/* Inspect pane */
.inspect-pane { display: grid; grid-template-columns: 1fr; min-height: 0; }
.inspect-pane .pane-scroll h4 {
  font: 600 11px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--mute);
  margin: 18px 0 8px;
}
.inspect-pane .pane-scroll h4:first-child { margin-top: 0; }
.inspect-pane .kv {
  display: grid; grid-template-columns: 110px 1fr; gap: 8px 14px;

  border-bottom: 1px dashed var(--line-soft);
}
.inspect-pane .kv .k { color: var(--mute); font: 12px/1.6 var(--font-mono); }
.inspect-pane .kv .v { color: var(--ink-2); }
.inspect-pane .swatch { display: inline-flex; align-items: center; gap: 8px; }
.inspect-pane .swatch .sq { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--line-soft); }

/* Workbench responsive */
@media (max-width: 1280px) { :root { --chat-w: 400px; } }
@media (max-width: 1100px) {
  :root { --chat-w: 360px; }
  .preview-frame-lg { height: min(480px, 100%); }
}
@media (max-width: 960px) {
  .proj-app.workbench { grid-template-rows: auto 1fr; }
  .proj-app.workbench .work-grid {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(280px, 0.85fr) minmax(360px, 1fr);

  .canvas-bar { padding: 6px 10px; }
  .canvas-bar .ctrl-group .ctrl .label { display: none; }
}
@media (max-width: 560px) {

  .preview-frame-lg .pstage { padding: 18px 16px; }
  .composer { padding: 10px 12px 12px; }
  .mention-pop { width: calc(100vw - 32px); left: 8px; }
  .canvas-bar .running-pill .lab { display: none; }
}

/* =========================================================
   UTILS
   ========================================================= */
function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function avHTML(agentId, opts) {
  const a = AGENTS[agentId];
  if (!a) return `<div class="av h-boss"${opts && opts.size ? ` style="width:${opts.size}px;height:${opts.size}px;font-size:${Math.floor(opts.size*0.4)}px;line-height:${opts.size}px"` : ''}>${(opts && opts.label) || '?'}</div>`;
  const cls = a.av;
  const style = opts && opts.size ? ` style="width:${opts.size}px;height:${opts.size}px;font-size:${Math.floor(opts.size*0.36)}px;line-height:${opts.size}px"` : '';
  return `<div class="av ${cls}"${style}>${a.initials}</div>`;
}
function avStack(ids, max) {
  max = max || 4;
  const shown = ids.slice(0, max);
  const more = ids.length - shown.length;
  return `<div class="av-stack">${shown.map(id => avHTML(id)).join('')}${more > 0 ? `<div class="more">+${more}</div>` : ''}</div>`;
}
function sparkPath(values) {
  if (!values || values.length < 2) return { line: '', fill: '' };
  const max = Math.max.apply(null, values);
  const min = Math.min.apply(null, values);
  const w = 100, h = 36;
  const xs = values.map((_, i) => (i * (w / (values.length - 1))));
  const ys = values.map(v => h - 4 - ((v - min) / Math.max(max - min, 1)) * (h - 8));
  let line = '';
  xs.forEach((x, i) => { line += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + ys[i].toFixed(2); });
  const fill = line + ' L' + w + ' ' + h + ' L0 ' + h + ' Z';
  return { line, fill };
}

  // 把这条 prompt 当成"新建项目"的初始目标,直接打开 modal 演示
  openNewProj(val);

}

function viewProject(hash) {
  const proj = PROJECTS.find(p => p.hash === hash) || PROJECTS[0];
  const stages = ['discovery','build','review','ship','maintenance'];
  const stageMap = { discovery: 'Discovery', build: 'Build', review: 'Review', ship: 'Ship', maintenance: 'Maintenance' };
  const stageCells = stages.map((s) => {
    const pct = proj.stages[s];
    let cls = 'future';
    if (pct >= 100) cls = 'done';
    else if (pct > 0) cls = 'active';
    return `
      <div class="stage-cell ${cls}">
        <div class="ttl"><span class="lvl"></span>${stageMap[s]}</div>
        <div class="sub">${pct}%</div>
        <div class="meter"><i style="--pct:${pct}%"></i></div>
      </div>`;
  }).join('');

  const projHeader = `
    <div class="proj-card">
      <div class="titleblock">
        <div class="row1">
          <span class="hash mono">#${proj.hash}</span>
          <span class="name">${esc(proj.name)}</span>
          <span class="lead">${esc(AGENTS[proj.lead].name)} 主理</span>
        </div>
        <div class="goal">${esc(proj.goal)}</div>
        <div class="stage-bar">${stageCells}</div>
      </div>
      <div class="right-stack">
        <div class="owners">${avStack(proj.members, 5)}</div>
        <div class="auto-ring" title="任务完成率">
          <svg viewBox="0 0 60 60">
            <circle class="track" cx="30" cy="30" r="26"/>
            <circle class="fill" cx="30" cy="30" r="26" stroke-dasharray="${((proj.tasksDone/proj.tasksTotal)*163.36).toFixed(2)},163.36"/>
          </svg>
          <div class="lab"><span style="font-family:var(--font-mono); font-size:11px; color:var(--mute); display:block;">完成</span>${proj.tasksDone}/${proj.tasksTotal}</div>
        </div>
      </div>
    </div>
  `;

  const tl = (proj.hash === 'pixel-2') ? timelinePixel() : timelineGeneric(proj);
  const canvasBar = canvasBarHTML(proj);
  const canvasPanes = canvasPanesHTML(proj);
  const composer = composerHTML(proj);

  return `
    <div class="proj-app workbench">
      ${projHeader}
      <div class="work-grid">
        <div class="chat-col">
          <div class="chat-scroll" id="chat-scroll">
            <div class="timeline">${tl}</div>
          </div>
          ${composer}
        </div>
        <div class="canvas-col">
          ${canvasBar}
          <div class="canvas-body">${canvasPanes}</div>
        </div>
      </div>
    </div>
  `;
}

/* =========================================================
   GRAPH — wire edges after render
   ========================================================= */
function wireGraph() {
  const graph = document.getElementById('graph');
  if (!graph) return;
  const edges = document.getElementById('graph-edges');
  if (!edges) return;
  // Edges as curves between node positions (in % of graph box).
  // We store the same positions as in nodes' inline styles.
  const W = graph.clientWidth, H = graph.clientHeight;
  const pts = {
    opt:           { x: 0.18, y: 0.14 },
    mem:           { x: 0.75, y: 0.14 },
    'task-radius': { x: 0.18, y: 0.38 },
    'agent-aria':  { x: 0.48, y: 0.38 },
    'review-lex':  { x: 0.78, y: 0.38 },
    'tool-tokens': { x: 0.18, y: 0.64 },
    'agent-cypher':{ x: 0.48, y: 0.64 },
    'deliver-pr':  { x: 0.48, y: 0.88 }
  };
  edges.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const lines = [
    ['task-radius','agent-aria'],
    ['agent-aria','review-lex'],
    ['agent-aria','agent-cypher'],
    ['tool-tokens','agent-cypher'],
    ['mem','agent-aria'],
    ['opt','task-radius'],
    ['agent-cypher','deliver-pr']
  ];
  let html = '';
  lines.forEach(([a, b]) => {
    const p1 = pts[a], p2 = pts[b];
    if (!p1 || !p2) return;
    const x1 = p1.x * W, y1 = p1.y * H, x2 = p2.x * W, y2 = p2.y * H;
    const dy = (y2 - y1) * 0.35;
    const cx1 = x1, cy1 = y1 + dy;
    const cx2 = x2, cy2 = y2 - dy;
    html += `<path d="M${x1} ${y1} C${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}"/>`;
  });
  edges.innerHTML = html;

  // Click to select node
  graph.querySelectorAll('.node').forEach(n => {
    n.addEventListener('click', () => {
      graph.querySelectorAll('.node').forEach(x => x.classList.remove('sel'));
      n.classList.add('sel');
      renderGraphDetail(n.dataset.id);
    });
  });
}

function route() {

  const hash = location.hash || '#/home';
  const parts = hash.replace(/^#\//, '').split('/');
  const head = parts[0];

  if (head === 'project') {

    const proj = PROJECTS.find(p => p.hash === parts[1]) || PROJECTS[0];

    host.innerHTML = viewSettings();

function wireProject() {
  // Canvas tabs (replaces old dock tabs)
  document.querySelectorAll('.canvas-bar .cv-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.canvas-bar .cv-tab').forEach(x => x.setAttribute('aria-selected', 'false'));
      t.setAttribute('aria-selected', 'true');
      const tab = t.dataset.tab;
      document.querySelectorAll('.canvas-pane').forEach(p => p.classList.toggle('on', p.dataset.pane === tab));
      if (tab === 'graph') setTimeout(wireGraph, 50);
    });
  });

  // Device + zoom toggle groups (visual only)
  document.querySelectorAll('.canvas-bar .ctrl-group').forEach(g => {
    g.querySelectorAll('.ctrl').forEach(c => {
      c.addEventListener('click', () => {
        if (g.dataset.group === 'zoom' && (c.dataset.zoom === '+' || c.dataset.zoom === '-')) {
          const val = g.querySelector('[data-zoom-val]');
          if (!val) return;
          let n = parseInt(val.textContent, 10);
          if (Number.isNaN(n)) n = 100;
          n = Math.max(25, Math.min(200, n + (c.dataset.zoom === '+' ? 10 : -10)));
          val.textContent = n + '%';
          return;
        }
        if (g.dataset.group === 'zoom' && c.dataset.zoom === 'fit') {
          const val = g.querySelector('[data-zoom-val]');
          if (val) val.textContent = '适配';
          return;
        }
        g.querySelectorAll('.ctrl').forEach(x => x.classList.remove('on'));
        c.classList.add('on');
      });
    });
  });

  // Editor file tabs (visual only, no real swap)
  document.querySelectorAll('.editor-pane .file-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.editor-pane .file-tab').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
    });
  });

  // Exec rows in the timeline — expand on click
  document.querySelectorAll('.exec-row').forEach(r => {
    r.addEventListener('click', (e) => {
      // Don't toggle if a child link is clicked
      if (e.target.closest('a')) return;
      r.classList.toggle('open');
    });
  });

  wireComposer();
}

function wireComposer() {
  const composer = document.getElementById('composer');
  if (!composer) return;
  const input = document.getElementById('composer-input');
  const pop = document.getElementById('mention-pop');
  const list = document.getElementById('mention-list');
  const search = document.getElementById('mention-search');
  const mentionBtn = document.getElementById('mention-btn');
  const sendBtn = document.getElementById('composer-send');
  if (!input || !pop || !list || !search || !mentionBtn || !sendBtn) return;

  let kbdIdx = -1;
  const closePop = () => {
    pop.classList.remove('on');
    mentionBtn.classList.remove('on');
    kbdIdx = -1;
    refreshKbd();
  };
  const openPop = (kind) => {
    if (kind) {
      list.dataset.active = kind;
      pop.querySelectorAll('.mp-tab').forEach(t => t.classList.toggle('on', t.dataset.mp === kind));
      pop.querySelectorAll('.list .grp').forEach(g => g.style.display = (g.dataset.grp === kind ? '' : 'none'));
    }
    pop.classList.add('on');
    mentionBtn.classList.add('on');
    setTimeout(() => search.focus(), 10);
    kbdIdx = -1;
    refreshKbd();
  };

  const visibleItems = () => {
    const active = list.dataset.active;
    const grp = list.querySelector('.grp[data-grp="' + active + '"]');
    if (!grp) return [];
    return Array.from(grp.querySelectorAll('.it')).filter(it => it.style.display !== 'none');
  };

  const refreshKbd = () => {
    const items = visibleItems();
    items.forEach((it, i) => it.classList.toggle('kbd-on', i === kbdIdx));
    if (kbdIdx >= 0 && items[kbdIdx]) {
      items[kbdIdx].scrollIntoView({ block: 'nearest' });
    }
  };

  const insertMention = (id) => {
    const v = input.value;
    const cur = input.selectionStart || v.length;
    // Strip a trailing "@" or "@xxx" partial token immediately before cursor if any
    let prefix = v.slice(0, cur);
    const after = v.slice(cur);
    const at = prefix.lastIndexOf('@');
    if (at >= 0 && /^@[^\s@]*$/.test(prefix.slice(at))) {
      prefix = prefix.slice(0, at);
    }
    const ins = id + ' ';
    input.value = prefix + ins + after;
    const pos = (prefix + ins).length;
    input.setSelectionRange(pos, pos);
    input.focus();
    closePop();
  };

  // Mention tabs
  pop.querySelectorAll('.mp-tab').forEach(t => {
    t.addEventListener('click', () => openPop(t.dataset.mp));
  });

  // Mention items click
  pop.querySelectorAll('.it').forEach(it => {
    it.addEventListener('click', () => insertMention(it.dataset.id));
  });

  // Mention search filter (within active group)
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    const active = list.dataset.active;
    const grp = list.querySelector('.grp[data-grp="' + active + '"]');
    if (!grp) return;
    grp.querySelectorAll('.it').forEach(it => {
      const hay = (it.dataset.search || '').toLowerCase();
      it.style.display = (q === '' || hay.includes(q)) ? '' : 'none';
    });
    kbdIdx = -1;
    refreshKbd();
  });

  // Keyboard nav within search input
  search.addEventListener('keydown', (e) => {
    const items = visibleItems();
    if (e.key === 'Escape') { e.preventDefault(); closePop(); input.focus(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); kbdIdx = (kbdIdx + 1) % Math.max(items.length, 1); refreshKbd(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); kbdIdx = (kbdIdx - 1 + items.length) % Math.max(items.length, 1); refreshKbd(); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      const pick = kbdIdx >= 0 ? items[kbdIdx] : items[0];
      if (pick) insertMention(pick.dataset.id);
    }
    else if (e.key === 'Tab') {
      e.preventDefault();
      const tabs = Array.from(pop.querySelectorAll('.mp-tab'));
      const ci = tabs.findIndex(x => x.classList.contains('on'));
      const next = tabs[(ci + (e.shiftKey ? -1 : 1) + tabs.length) % tabs.length];
      openPop(next.dataset.mp);
    }
  });

  // @ button
  mentionBtn.addEventListener('click', () => {
    if (pop.classList.contains('on')) closePop();
    else openPop(list.dataset.active || 'agent');
  });

  // Typing "@" in textarea opens popup
  input.addEventListener('input', () => {
    const v = input.value;
    const cur = input.selectionStart || v.length;
    const prefix = v.slice(0, cur);
    const m = prefix.match(/(?:^|\s)(@[^\s@]*)$/);
    if (m) {
      const partial = m[1].slice(1);
      if (!pop.classList.contains('on')) openPop(list.dataset.active || 'agent');
      search.value = partial;
      search.dispatchEvent(new Event('input'));
    } else if (pop.classList.contains('on')) {
      // user wandered away from an @ token — close popup but keep value
      const stillNearby = /(?:^|\s)@[^\s]*$/.test(prefix);
      if (!stillNearby) closePop();
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closePop(); return; }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      sendBtn.click();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (sendBtn.classList.contains('stop')) {
      // Demo: convert to send mode
      sendBtn.classList.remove('stop');
      sendBtn.innerHTML = '<svg class="ic ar" viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4"/></svg>派工';
      const pill = document.querySelector('.canvas-bar .running-pill');
      if (pill) pill.remove();
      return;
    }
    const val = (input.value || '').trim();
    if (!val) { input.focus(); return; }
    // Demo: clear and bounce
    input.value = '';
    input.focus();
    sendBtn.classList.add('stop');
    sendBtn.innerHTML = '<span class="sq"></span>停止';
  });

  // Close on outside click
  document.addEventListener('mousedown', (e) => {
    if (!pop.classList.contains('on')) return;
    if (composer.contains(e.target)) return;
    closePop();
  }, { passive: true });
}

function wireExtTabs() {
  document.querySelectorAll('.ext-tabs').forEach(group => {
    group.querySelectorAll('.ext-tab').forEach(t => {
      t.addEventListener('click', () => {
        if (t.dataset.disabled === 'true') return;
        group.querySelectorAll('.ext-tab').forEach(x => x.setAttribute('aria-selected', 'false'));
        t.setAttribute('aria-selected', 'true');
        const tab = t.dataset.tab;
        document.querySelectorAll('.ext-pane').forEach(p => p.classList.toggle('on', p.dataset.pane === tab));
      });
    });
  });
}

function wireMcpToggles() {
  document.querySelectorAll('[data-mcp-toggle]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const row = b.closest('.mcp-row');
      const on = !b.classList.contains('on');
      b.classList.toggle('on', on);
      row.setAttribute('data-state', on ? 'on' : 'off');
    });
  });
  document.querySelectorAll('[data-conn-toggle]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = b.closest('.conn-card');
      const on = card.getAttribute('data-on') !== 'true';
      card.setAttribute('data-on', on ? 'true' : 'false');
    });
  });
}

/* =========================================================
   THEME
   ========================================================= */
function initTheme() {
  const saved = localStorage.getItem('heliox:theme');
  if (saved === 'light' || saved === 'dark') document.documentElement.dataset.theme = saved;
  updateThemeIcon();
}
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('heliox:theme', next);
  updateThemeIcon();
}
function updateThemeIcon() {
  const ic = document.getElementById('theme-icon');
  if (!ic) return;
  const dark = document.documentElement.dataset.theme === 'dark';
  // moon in dark mode, sun in light mode
  ic.innerHTML = dark
    ? '<path d="M14 9.5A6 6 0 0 1 6.5 2 6 6 0 1 0 14 9.5z"/>'
    : '<circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M13 8h2M1 8h2M11.5 4.5l1.4-1.4M3.1 12.9l1.4-1.4M11.5 11.5l1.4 1.4M3.1 3.1l1.4 1.4"/>';
}

/* =========================================================
   BOOT
   ========================================================= */
document.addEventListener('click', (e) => {
  const a = e.target.closest('[data-route]');
  if (a) {
    e.preventDefault();
    location.hash = a.dataset.route;
    return;
  }
  const np = e.target.closest('#new-proj-btn, [data-action="new-proj"]');
  if (np) { e.preventDefault(); openNewProj(); return; }
  const mb = e.target.closest('#menu-btn');
  if (mb) { document.getElementById('rail').classList.toggle('on'); return; }
  const tb = e.target.closest('#theme-btn');
  if (tb) { toggleTheme(); return; }
  const ck = e.target.closest('.switch');
  if (ck) { ck.classList.toggle('on'); return; }
  const ms = e.target.closest('#modal-veil');
  if (ms && ms === e.target) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  // 主页输入框:Enter 派工,Shift+Enter 换行
  if (e.target && e.target.id === 'home-prompt-input' && e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    submitHomePrompt(e);
    return;
  }
  // ⌘1 / ⌘2 切主页 / 公司全景
  if ((e.metaKey || e.ctrlKey) && (e.key === '1' || e.key === '2')) {
    const tag = e.target && e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
    e.preventDefault();
    location.hash = e.key === '1' ? '#/home' : '#/dashboard';
  }
});
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', () => {
  initTheme();
  route();
});
</script>
