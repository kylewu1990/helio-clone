<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Heliox — AI Workbench</title>
<style>
/* =========================================================
   TOKENS — soft-glass workbench, dual mode, warm amber accent
   Optimizer keeps the only purple in the system.
   ========================================================= */
:root {
  /* Light */
  --bg:           oklch(98.2% 0.005 80);
  --canvas:       oklch(96.5% 0.006 80);
  --glass:        oklch(100% 0 0 / 0.66);
  --glass-2:      oklch(100% 0 0 / 0.42);
  --glass-3:      oklch(100% 0 0 / 0.22);
  --line:         oklch(86% 0.008 80 / 0.65);
  --line-soft:    oklch(86% 0.008 80 / 0.35);
  --line-strong:  oklch(72% 0.012 80 / 0.5);
  --ink:          oklch(20% 0.018 80);
  --ink-2:        oklch(34% 0.016 80);
  --ink-3:        oklch(48% 0.014 80);
  --mute:         oklch(60% 0.012 80);
  --mute-2:       oklch(72% 0.01 80);

  --accent:       oklch(64% 0.14 55);
  --accent-2:     oklch(72% 0.16 65);
  --accent-soft:  oklch(64% 0.14 55 / 0.12);

  --ok:           oklch(56% 0.14 155);
  --ok-glow:      oklch(70% 0.16 155 / 0.45);
  --warn:         oklch(66% 0.14 80);
  --danger:       oklch(58% 0.18 25);
  --info:         oklch(58% 0.12 230);

  --opt:          oklch(56% 0.18 295);
  --opt-2:        oklch(64% 0.18 295);
  --opt-soft:     oklch(56% 0.18 295 / 0.12);

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 26px;

  --shadow-1: 0 1px 0 oklch(100% 0 0 / 0.7) inset, 0 1px 2px oklch(20% 0.02 80 / 0.06), 0 12px 30px oklch(20% 0.02 80 / 0.06);
  --shadow-2: 0 1px 0 oklch(100% 0 0 / 0.7) inset, 0 4px 12px oklch(20% 0.02 80 / 0.08), 0 30px 60px oklch(20% 0.02 80 / 0.08);

  --font-display: 'Inter Tight', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, 'Cascadia Mono', monospace;

  --rail-w: 248px;
  --dock-w: 360px;
  --topbar-h: 56px;

  --ease: cubic-bezier(.22,.61,.36,1);
}

html[data-theme="dark"] {
  --bg:           oklch(15.5% 0.018 248);
  --canvas:       oklch(18% 0.02 248);
  --glass:        oklch(26% 0.018 248 / 0.55);
  --glass-2:      oklch(30% 0.018 248 / 0.38);
  --glass-3:      oklch(34% 0.018 248 / 0.22);
  --line:         oklch(48% 0.018 248 / 0.32);
  --line-soft:    oklch(48% 0.018 248 / 0.18);
  --line-strong:  oklch(64% 0.02 248 / 0.42);
  --ink:          oklch(96% 0.006 80);
  --ink-2:        oklch(84% 0.01 80);
  --ink-3:        oklch(70% 0.012 80);
  --mute:         oklch(58% 0.014 80);
  --mute-2:       oklch(48% 0.014 80);

  --accent:       oklch(76% 0.14 65);
  --accent-2:     oklch(82% 0.16 75);
  --accent-soft:  oklch(76% 0.14 65 / 0.16);

  --ok:           oklch(74% 0.16 155);
  --ok-glow:      oklch(78% 0.18 155 / 0.55);
  --warn:         oklch(80% 0.14 80);
  --danger:       oklch(72% 0.18 25);
  --info:         oklch(70% 0.14 230);

  --opt:          oklch(70% 0.18 295);
  --opt-2:        oklch(78% 0.18 295);
  --opt-soft:     oklch(70% 0.18 295 / 0.18);

  --shadow-1: 0 1px 0 oklch(100% 0 0 / 0.04) inset, 0 1px 2px oklch(0% 0 0 / 0.3), 0 12px 30px oklch(0% 0 0 / 0.35);
  --shadow-2: 0 1px 0 oklch(100% 0 0 / 0.04) inset, 0 4px 12px oklch(0% 0 0 / 0.35), 0 30px 60px oklch(0% 0 0 / 0.45);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font: 14px/1.5 var(--font-body);
  color: var(--ink);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 88% -10%, oklch(78% 0.14 65 / 0.10), transparent 60%),
    radial-gradient(ellipse 70% 50% at -10% 110%, oklch(60% 0.12 230 / 0.07), transparent 60%);
  background-attachment: fixed;
  background-repeat: no-repeat;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01", "ss03";
  overflow: hidden;
}
html[data-theme="light"] body {
  background-image:
    radial-gradient(ellipse 80% 60% at 88% -10%, oklch(72% 0.14 60 / 0.14), transparent 60%),
    radial-gradient(ellipse 70% 50% at -10% 110%, oklch(70% 0.10 230 / 0.10), transparent 60%);
}
button, input, textarea, select { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }
input, textarea { background: transparent; border: 0; outline: 0; color: inherit; }
::selection { background: var(--accent-soft); color: var(--ink); }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.tnum { font-variant-numeric: tabular-nums; }
.kicker { font: 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; color: var(--mute); }

/* =========================================================
   APP SHELL
   ========================================================= */
.app {
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  height: 100vh;
}
.topbar {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: var(--rail-w) 1fr auto;
  align-items: center;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-3);
  backdrop-filter: saturate(140%) blur(20px);
  -webkit-backdrop-filter: saturate(140%) blur(20px);
  z-index: 50;
  position: relative;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px;
  border-right: 1px solid var(--line-soft);
  height: 100%;
}
.brand-mark {
  width: 22px; height: 22px; border-radius: 7px;
  background: conic-gradient(from 210deg at 50% 50%, oklch(78% 0.16 70), oklch(64% 0.14 55), oklch(76% 0.14 100), oklch(78% 0.16 70));
  position: relative;
  box-shadow: 0 0 0 1px oklch(20% 0.02 80 / 0.1), 0 2px 6px oklch(60% 0.14 55 / 0.3);
}
.brand-mark::after {
  content: "";
  position: absolute; inset: 5px;
  border-radius: 50%;
  background: var(--bg);
}
.brand-name { font: 600 14px/1 var(--font-display); letter-spacing: -0.005em; }
.brand-name span { color: var(--accent); }

.crumbs {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px;
  color: var(--ink-3);
  font-size: 13px;
  min-width: 0;
}
.crumbs .ws {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--glass);
}
.crumbs .ws .dot { width: 16px; height: 16px; border-radius: 5px; background: oklch(70% 0.14 200); }
.crumbs .sep { opacity: 0.4; }
.crumbs .where { color: var(--ink); font-weight: 500; }

.top-actions { display: flex; align-items: center; gap: 6px; padding: 0 16px; height: 100%; }
.t-btn {
  height: 32px; padding: 0 10px;
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--glass);
  color: var(--ink-2);
  font-size: 12.5px;
  transition: background .2s var(--ease), border-color .2s var(--ease), color .2s var(--ease);
}
.t-btn:hover { background: var(--glass-2); color: var(--ink); border-color: var(--line-strong); }
.t-btn .ic { width: 14px; height: 14px; opacity: 0.7; }
.kbd {
  font: 11px/1 var(--font-mono); padding: 2px 5px;
  border: 1px solid var(--line); border-radius: 4px;
  background: var(--glass-2);
  color: var(--mute);
}
.av {
  width: 28px; height: 28px; border-radius: 50%;
  background: oklch(64% 0.14 35);
  color: white; font: 600 11px/28px var(--font-display);
  text-align: center;
  border: 1px solid oklch(100% 0 0 / 0.15);
}

/* Left rail */
.rail {
  border-right: 1px solid var(--line-soft);
  background: var(--glass-3);
  backdrop-filter: saturate(140%) blur(20px);
  -webkit-backdrop-filter: saturate(140%) blur(20px);
  overflow-y: auto;
  padding: 14px 0 24px;
}
.rail-group { padding: 10px 12px 4px; }
.rail-group .head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px 6px;
  color: var(--mute);
  font: 11px/1 var(--font-mono); letter-spacing: 0.16em;
  text-transform: uppercase;
}
.rail-group .head .add {
  width: 18px; height: 18px; border-radius: 5px;
  color: var(--mute); display: grid; place-items: center;
}
.rail-group .head .add:hover { background: var(--glass-2); color: var(--ink); }
.rail-list { display: flex; flex-direction: column; gap: 1px; }
.rail-item {
  display: grid; grid-template-columns: 18px 1fr auto; align-items: center; gap: 9px;
  padding: 6px 9px; border-radius: 7px;
  color: var(--ink-2); font-size: 13px;
  position: relative;
  cursor: pointer;
}
.rail-item .mk { display: grid; place-items: center; opacity: 0.7; }
.rail-item .mk .hash { font: 600 13px/1 var(--font-mono); color: var(--mute); }
.rail-item .mk .lock { font: 13px/1 var(--font-mono); color: var(--mute); }
.rail-item .mk .lvl {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--mute-2);
}
.rail-item:hover { background: var(--glass-2); color: var(--ink); }
.rail-item.active { background: var(--accent-soft); color: var(--ink); }
.rail-item.active .hash { color: var(--accent); }
.rail-item .count {
  font: 11px/1 var(--font-mono); color: var(--mute);
}
.rail-item .badge {
  background: var(--accent); color: oklch(15% 0.02 80);
  font: 600 10px/1 var(--font-mono);
  padding: 3px 5px; border-radius: 999px;
}
.rail-item .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 var(--ok-glow); animation: pulse 2.2s var(--ease) infinite; }

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 var(--ok-glow); }
  70%  { box-shadow: 0 0 0 7px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

/* Main viewport */
.view {
  overflow: hidden;
  position: relative;
  min-width: 0;
}
.view-scroll {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* =========================================================
   DASHBOARD — company view
   ========================================================= */
.dash {
  padding: 28px 40px 80px;
  max-width: 1480px;
  margin: 0 auto;
}
.dash-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px;
  margin-bottom: 22px;
}
.dash-head h1 {
  font: 600 28px/1.15 var(--font-display);
  letter-spacing: -0.02em;
}
.dash-head h1 em {
  font-style: normal;
  background: linear-gradient(94deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.dash-head .sub {
  font-size: 13.5px;
  color: var(--ink-3);
  margin-top: 6px;
}
.dash-head .right { display: flex; gap: 8px; align-items: center; }

.kpi-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  padding: 4px;
  box-shadow: var(--shadow-1);
  margin-bottom: 26px;
}
.kpi {
  padding: 14px 18px 16px;
  border-right: 1px solid var(--line-soft);
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
}
.kpi:last-child { border-right: 0; }
.kpi .lab { font-size: 12px; color: var(--mute); display: flex; gap: 6px; align-items: center; }
.kpi .lab .lvl { width: 6px; height: 6px; border-radius: 50%; }
.kpi .val {
  font: 600 24px/1.1 var(--font-display);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.kpi .val .unit { font: 500 13px/1 var(--font-body); color: var(--mute); margin-left: 4px; }
.kpi .delta { font: 11px/1 var(--font-mono); color: var(--mute); display: flex; gap: 5px; align-items: center; }
.kpi .delta.up { color: var(--ok); }
.kpi .delta.down { color: var(--danger); }

.dept-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.dept-card {
  position: relative;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  padding: 18px 18px 16px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 14px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
  cursor: pointer;
  transition: transform .25s var(--ease), border-color .25s var(--ease), box-shadow .25s var(--ease);
}
.dept-card:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-2); }
.dept-card[data-state="running"]::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--ok-glow), transparent 70%);
  opacity: 0;
  animation: cardBreath 3.6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes cardBreath {
  0%, 100% { opacity: 0.0; }
  50%      { opacity: 0.55; }
}
.dept-card[data-state="stuck"] {
  border-color: oklch(70% 0.18 25 / 0.45);
}

.dept-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.dept-name {
  font: 600 17px/1.1 var(--font-display);
  letter-spacing: -0.01em;
}
.dept-meta { font-size: 12px; color: var(--mute); margin-top: 2px; }
.dept-state {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 8px 4px 7px;
  border: 1px solid var(--line);
  border-radius: 999px;
  font: 11px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
  background: var(--glass-2);
}
.dept-state .lvl { width: 6px; height: 6px; border-radius: 50%; }
.dept-state.running .lvl { background: var(--ok); box-shadow: 0 0 0 0 var(--ok-glow); animation: pulse 2.2s var(--ease) infinite; }
.dept-state.idle .lvl    { background: var(--mute-2); }
.dept-state.stuck .lvl   { background: var(--danger); }
.dept-state.waiting .lvl { background: var(--warn); }

.av-stack { display: flex; align-items: center; }
.av-stack .av {
  width: 26px; height: 26px;
  border-radius: 50%;
  font-size: 10.5px; line-height: 26px;
  margin-left: -7px;
  border: 2px solid var(--canvas);
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.18);
}
.av-stack .av:first-child { margin-left: 0; }
.av-stack .more {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--glass-2); color: var(--mute);
  font: 600 10px/26px var(--font-mono);
  text-align: center;
  margin-left: -7px;
  border: 2px solid var(--canvas);
}

.dept-body {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: end;
}
.dept-spark { min-width: 0; }
.dept-spark .lab { font-size: 11.5px; color: var(--mute); margin-bottom: 6px; display: flex; justify-content: space-between; }
.dept-spark .lab .num { color: var(--ink); font-family: var(--font-mono); font-size: 12px; }
.spark-svg { width: 100%; height: 36px; display: block; }
.spark-svg path.line { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
.spark-svg path.fill { fill: var(--accent-soft); stroke: none; }

.auto-ring { width: 64px; height: 64px; position: relative; }
.auto-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.auto-ring .track { stroke: var(--line); stroke-width: 6; fill: none; }
.auto-ring .fill  { stroke: var(--accent); stroke-width: 6; fill: none; stroke-linecap: round; transition: stroke-dasharray .8s var(--ease); }
.auto-ring .lab {
  position: absolute; inset: 0; display: grid; place-items: center;
  font: 600 14px/1 var(--font-display);
  font-variant-numeric: tabular-nums;
}
.auto-ring .lab span { font: 500 9px/1 var(--font-mono); color: var(--mute); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.1em; }

.dept-foot {
  display: grid; grid-template-columns: auto 1fr;
  gap: 8px; align-items: center;
  padding-top: 12px;
  border-top: 1px dashed var(--line-soft);
}
.dept-foot .blk-lab {
  font: 10px/1 var(--font-mono);
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mute);
  padding-right: 8px;
  border-right: 1px solid var(--line-soft);
}
.dept-foot .blk { font-size: 12.5px; color: var(--ink-2); }

/* =========================================================
   HOME — boss-facing launcher
   ========================================================= */
.home {
  padding: 30px 40px 80px;
  max-width: 1480px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 26px;
  align-items: start;
}
.home-main { display: grid; gap: 26px; min-width: 0; }
.home-side { display: grid; gap: 18px; }

.home-hero {
  position: relative;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  box-shadow: var(--shadow-1);
  padding: 26px 28px 22px;
  overflow: hidden;
}
.home-hero::before {
  content: "";
  position: absolute;
  inset: -2px -2px auto auto;
  width: 60%;
  height: 70%;
  background: radial-gradient(ellipse 70% 60% at 80% 0%, var(--accent-soft), transparent 70%);
  pointer-events: none;
  opacity: 0.7;
}
.home-hero .greet {
  display: flex; align-items: center; gap: 10px;
  font: 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--mute);
  margin-bottom: 12px;
}
.home-hero .greet .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 var(--ok-glow); animation: pulse 2.2s var(--ease) infinite; }
.home-hero h1 {
  font: 600 30px/1.15 var(--font-display);
  letter-spacing: -0.02em;
  max-width: 28ch;
}
.home-hero h1 em {
  font-style: normal;
  background: linear-gradient(94deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.home-hero .sub {
  font-size: 13.5px;
  color: var(--ink-3);
  margin-top: 8px;
  max-width: 56ch;
}

.home-prompt {
  margin-top: 22px;
  background: var(--glass-2);
  border: 1px solid var(--line);
  border-radius: 14px;
  display: grid;
  grid-template-rows: 1fr auto;
  min-height: 130px;
  transition: border-color .2s var(--ease), background .2s var(--ease);
}
.home-prompt:focus-within { border-color: var(--line-strong); background: var(--glass); }
.home-prompt textarea {
  appearance: none;
  background: transparent;
  border: 0;
  outline: 0;
  resize: none;
  padding: 16px 18px 8px;
  font: 15px/1.55 var(--font-body);
  color: var(--ink);
  width: 100%;
}
.home-prompt textarea::placeholder { color: var(--mute-2); }
.home-prompt .row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px 10px 14px;
  border-top: 1px solid var(--line-soft);
}
.home-prompt .row .scope-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--glass-3);
  font: 11px/1 var(--font-mono); letter-spacing: 0.08em;
  color: var(--ink-2);
  cursor: pointer;
}
.home-prompt .row .scope-pill .mini { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.home-prompt .row .spacer { flex: 1; }
.home-prompt .row .hint { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.1em; }
.home-prompt .row .send {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--accent);
  color: oklch(15% 0.02 80);
  font: 600 12.5px/1 var(--font-display);
  letter-spacing: -0.005em;
  border: 0;
  cursor: pointer;
  transition: transform .15s var(--ease), filter .15s var(--ease);
}
[data-theme="dark"] .home-prompt .row .send { color: oklch(14% 0.012 245); }
.home-prompt .row .send:hover { transform: translateY(-1px); filter: brightness(1.05); }
.home-prompt .row .send .kbd { font: 11px/1 var(--font-mono); opacity: 0.75; }

.home-section {
  display: grid;
  gap: 14px;
}
.home-section .sec-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px;
}
.home-section .sec-head .ttl {
  font: 600 15px/1 var(--font-display);
  letter-spacing: -0.005em;
}
.home-section .sec-head .ttl .count {
  font: 500 11px/1 var(--font-mono);
  color: var(--mute);
  margin-left: 8px;
  letter-spacing: 0.08em;
}
.home-section .sec-head .more {
  font: 11px/1 var(--font-mono);
  color: var(--mute);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}
.home-section .sec-head .more:hover { color: var(--accent); }

.action-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.action-card {
  position: relative;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 10px;
  padding: 16px 16px 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  box-shadow: var(--shadow-1);
  cursor: pointer;
  text-align: left;
  color: inherit;
  transition: transform .22s var(--ease), border-color .22s var(--ease), box-shadow .22s var(--ease);
  overflow: hidden;
}
.action-card:hover {
  transform: translateY(-2px);
  border-color: var(--line-strong);
  box-shadow: var(--shadow-2);
}
.action-card:hover .ic-tile { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.action-card .ic-tile {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--glass-3);
  color: var(--ink-2);
  transition: background .22s var(--ease), color .22s var(--ease), border-color .22s var(--ease);
}
.action-card .ic-tile svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.action-card .ttl {
  font: 600 14px/1.25 var(--font-display);
  letter-spacing: -0.005em;
  color: var(--ink);
}
.action-card .desc {
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.45;
  margin-top: -4px;
}
.action-card .foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-soft);
}
.action-card .foot .crew { display: flex; align-items: center; gap: 6px; }
.action-card .foot .crew .av { width: 18px; height: 18px; font-size: 8px; line-height: 18px; border-radius: 50%; }
.action-card .foot .crew .av + .av { margin-left: -6px; }
.action-card .foot .eta {
  font: 10px/1 var(--font-mono); letter-spacing: 0.1em;
  color: var(--mute);
  text-transform: uppercase;
}
.action-card.featured { grid-column: span 2; grid-template-columns: 36px 1fr; grid-template-rows: auto auto auto; }
.action-card.featured .ic-tile { grid-row: 1 / span 3; align-self: start; width: 44px; height: 44px; border-radius: 12px; }
.action-card.featured .ic-tile svg { width: 22px; height: 22px; }
.action-card.featured .ttl { font-size: 16px; }
.action-card.featured .desc { font-size: 12.5px; }
.action-card.featured .foot { grid-column: 1 / -1; }

/* Recent projects strip */
.home-projects {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.proj-mini {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  padding: 14px 16px 13px;
  display: grid;
  gap: 8px;
  position: relative;
  cursor: pointer;
  transition: transform .22s var(--ease), border-color .22s var(--ease);
}
.proj-mini:hover { transform: translateY(-1px); border-color: var(--line-strong); }
.proj-mini[data-state="running"]::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: radial-gradient(ellipse 70% 40% at 0% 50%, var(--ok-glow), transparent 60%);
  opacity: 0.5;
  pointer-events: none;
}
.proj-mini[data-state="stuck"] { border-color: oklch(58% 0.18 25 / 0.45); }
.proj-mini .hd {
  display: flex; align-items: center; gap: 8px;
}
.proj-mini .hd .hash { font: 500 11px/1 var(--font-mono); color: var(--mute); }
.proj-mini .hd .stg {
  margin-left: auto;
  font: 9.5px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-3);
  padding: 3px 7px;
  border: 1px solid var(--line);
  border-radius: 999px;
}
.proj-mini .nm { font: 600 14px/1.25 var(--font-display); letter-spacing: -0.005em; }
.proj-mini .meter { height: 5px; border-radius: 3px; background: var(--line); overflow: hidden; }
.proj-mini .meter > i { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: var(--pct, 0%); }
.proj-mini .ft { display: flex; align-items: center; justify-content: space-between; }
.proj-mini .ft .pct { font: 600 11px/1 var(--font-mono); color: var(--ink-2); }
.proj-mini .ft .av-stack { transform: none; }
.proj-mini .ft .av-stack .av { width: 18px; height: 18px; font-size: 8px; line-height: 18px; }

/* Side rail — today + optimizer */
.side-block {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.side-block .sb-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--line-soft);
}
.side-block .sb-head .ttl {
  font: 600 13px/1 var(--font-display);
  letter-spacing: -0.005em;
}
.side-block .sb-head .meta {
  margin-left: auto;
  font: 11px/1 var(--font-mono);
  color: var(--mute);
  letter-spacing: 0.08em;
}
.side-block .sb-body { padding: 8px 0 6px; }

.feed-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 10px;
  padding: 9px 16px 9px 14px;
  align-items: start;
  transition: background .2s var(--ease);
  cursor: pointer;
}
.feed-item:hover { background: var(--glass-3); }
.feed-item .mk {
  width: 20px; height: 20px; border-radius: 6px;
  display: grid; place-items: center;
  background: var(--glass-3);
  border: 1px solid var(--line-soft);
  color: var(--ink-2);
}
.feed-item .mk.opt { color: var(--opt); border-color: oklch(70% 0.18 295 / 0.35); background: oklch(70% 0.18 295 / 0.08); }
.feed-item .mk.done { color: var(--ok); border-color: oklch(70% 0.16 155 / 0.3); }
.feed-item .mk.stuck { color: var(--danger); border-color: oklch(58% 0.18 25 / 0.3); }
.feed-item .mk svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.feed-item .ln { font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
.feed-item .ln strong { color: var(--ink); font-weight: 600; }
.feed-item .ln em { font-style: normal; color: var(--accent); font-family: var(--font-mono); font-size: 11px; padding: 0 1px; }
.feed-item .ts { font: 10.5px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.04em; padding-top: 2px; }

.opt-tip {
  margin: 12px 14px 14px;
  border: 1px solid oklch(70% 0.18 295 / 0.35);
  border-radius: var(--r-md);
  background: oklch(70% 0.18 295 / 0.07);
  padding: 12px 14px 13px;
  position: relative;
}
.opt-tip::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 2px;
  background: linear-gradient(90deg, var(--opt), var(--opt-2), var(--opt));
  background-size: 200% 100%;
  animation: optsweep 5s linear infinite;
}
@keyframes optsweep { from { background-position: 0% 0; } to { background-position: -200% 0; } }
.opt-tip .kicker { color: var(--opt); }
.opt-tip .q { font: 600 13.5px/1.4 var(--font-display); letter-spacing: -0.005em; margin: 6px 0 8px; }
.opt-tip .why { font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }
.opt-tip .acts { display: flex; gap: 8px; }
.opt-tip .acts .b {
  font: 11px/1 var(--font-mono); letter-spacing: 0.06em;
  padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--glass-2);
  color: var(--ink-2);
  cursor: pointer;
}
.opt-tip .acts .b.accept { background: var(--opt); color: white; border-color: var(--opt); }

/* Tiny KPI strip on home (compact) */
.home-kpis {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--glass-3);
  overflow: hidden;
}
.home-kpis .it {
  padding: 10px 14px 11px;
  border-right: 1px solid var(--line-soft);
  display: grid; gap: 2px;
}
.home-kpis .it:last-child { border-right: 0; }
.home-kpis .it .lab { font: 10.5px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.12em; text-transform: uppercase; }
.home-kpis .it .val { font: 600 17px/1 var(--font-display); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.home-kpis .it .val .delta { font: 10.5px/1 var(--font-mono); color: var(--mute); margin-left: 6px; }
.home-kpis .it .val .delta.up { color: var(--ok); }

/* =========================================================
   PROJECT CHANNEL
   ========================================================= */
.proj-app {
  display: grid;
  grid-template-columns: 1fr var(--dock-w);
  height: 100%;
  min-height: 0;
}
.proj-main {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
  border-right: 1px solid var(--line-soft);
}

/* Project header card */
.proj-card {
  margin: 18px 22px 0;
  padding: 16px 18px 16px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  box-shadow: var(--shadow-1);
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  column-gap: 22px;
  row-gap: 14px;
  align-items: start;
}
.proj-card .titleblock {
  display: grid; gap: 6px; min-width: 0;
  grid-column: 1;
  grid-row: 1;
}
.proj-card .row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.proj-card .hash { font: 500 13px/1 var(--font-mono); color: var(--mute); }
.proj-card .name { font: 600 17px/1.1 var(--font-display); letter-spacing: -0.01em; }
.proj-card .lead {
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  border: 1px solid var(--accent-soft); color: var(--accent);
  background: var(--accent-soft);
}
.proj-card .goal { color: var(--ink-2); font-size: 13.5px; max-width: 64ch; }

.stage-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  align-items: stretch;
  grid-column: 1 / -1;
  grid-row: 2;
}
.stage-cell {
  position: relative;
  display: grid; gap: 4px;
  padding: 8px 10px 8px;
  border-radius: 9px;
  border: 1px solid var(--line-soft);
  background: var(--glass-3);
}
.stage-cell .ttl {
  font: 11px/1 var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--mute);
  display: flex; gap: 6px; align-items: center;
}
.stage-cell .ttl .lvl { width: 5px; height: 5px; border-radius: 50%; background: var(--mute-2); }
.stage-cell .sub { font-size: 12px; color: var(--ink-2); }
.stage-cell .meter {
  height: 3px; border-radius: 2px;
  background: var(--line);
  overflow: hidden;
  margin-top: 4px;
}
.stage-cell .meter > i {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  width: var(--pct, 0%);
}
.stage-cell.done { border-color: var(--line); }
.stage-cell.done .ttl .lvl { background: var(--ok); }
.stage-cell.done .ttl { color: var(--ok); }
.stage-cell.active { border-color: var(--accent); background: var(--accent-soft); }
.stage-cell.active .ttl { color: var(--accent); }
.stage-cell.active .ttl .lvl { background: var(--accent); animation: pulse 2.2s var(--ease) infinite; box-shadow: 0 0 0 0 var(--accent-soft); }
.stage-cell.future .ttl .lvl { background: var(--mute-2); }

.proj-card .right-stack {
  display: grid; grid-template-columns: auto auto; gap: 14px; align-items: center;
  grid-column: 2;
  grid-row: 1;
  justify-self: end;
}
.proj-card .owners { display: flex; align-items: center; gap: 8px; }
.proj-card .owners .lab {
  font: 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute);
}
.proj-card .auto-ring { width: 56px; height: 56px; }
.proj-card .auto-ring .lab { font-size: 13px; }
.proj-card .auto-ring .fill { stroke: var(--ok); }

/* Timeline */
.timeline {
  padding: 18px 22px 80px;
  display: grid;
  gap: 14px;
}
.day-divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--mute);
  margin: 8px 0 -2px;
}
.day-divider .line { height: 1px; flex: 1; background: var(--line-soft); }
.day-divider .lab { font: 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase; }

.msg {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 12px;
  align-items: flex-start;
}
.msg .av { width: 32px; height: 32px; border-radius: 9px; font-size: 12px; line-height: 32px; align-self: start; margin-top: 2px; }
.msg.boss .av { background: linear-gradient(135deg, oklch(60% 0.16 30), oklch(70% 0.16 50)); }
.msg .body { min-width: 0; }
.msg .head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 4px;
}
.msg .head .who { font: 600 13.5px/1 var(--font-display); }
.msg .head .role { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.06em; text-transform: uppercase; }
.msg .head .time { font: 11px/1 var(--font-mono); color: var(--mute-2); margin-left: auto; }
.msg .text {
  font-size: 14px;
  color: var(--ink-2);
  text-wrap: pretty;
  line-height: 1.55;
}
.msg .text .mention {
  background: var(--accent-soft); color: var(--accent);
  padding: 1px 5px; border-radius: 5px;
  font-weight: 500;
}

/* Progress card */
.tl-card {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  margin-top: 8px;
  overflow: hidden;
}
.tl-card .hd {
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line-soft);
  font-size: 12.5px;
}
.tl-card .hd .l { display: flex; align-items: center; gap: 8px; }
.tl-card .hd .l .ic { width: 14px; height: 14px; opacity: 0.85; }
.tl-card .hd .l .ttl { font: 600 12.5px/1 var(--font-display); color: var(--ink); }
.tl-card .hd .l .meta { color: var(--mute); }
.tl-card .hd .r { display: flex; gap: 6px; align-items: center; color: var(--mute); font: 11px/1 var(--font-mono); }

.tl-card.progress .bd {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
}
.tl-card.progress .bd .col {
  padding: 14px;
  border-right: 1px solid var(--line-soft);
}
.tl-card.progress .bd .col:last-child { border-right: 0; }
.tl-card.progress .col .l {
  font: 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mute);
  display: flex; justify-content: space-between;
  margin-bottom: 8px;
}
.tl-card.progress .col .l span { color: var(--ink); }
.tl-card.progress .col .meter { height: 6px; border-radius: 3px; background: var(--line); overflow: hidden; }
.tl-card.progress .col .meter > i { display:block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: var(--pct, 0%); }
.tl-card.progress .col .desc { margin-top: 8px; font-size: 12.5px; color: var(--ink-2); }

/* Delivery card */
.tl-card.delivery .hd { border-bottom-color: var(--line); }
.tl-card.delivery .banner {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--line-soft);
  background: linear-gradient(120deg, var(--glass-2), transparent 70%);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}
.tl-card.delivery .banner .title { font: 600 14px/1.3 var(--font-display); letter-spacing: -0.01em; }
.tl-card.delivery .banner .ref {
  font: 11px/1.4 var(--font-mono);
  color: var(--mute);
  margin-top: 4px;
}
.tl-card.delivery .banner .badges {
  display: flex; gap: 6px;
  font: 11px/1 var(--font-mono);
}
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 7px; border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--glass-2);
  color: var(--ink-3);
}
.badge .lvl { width: 6px; height: 6px; border-radius: 50%; }
.badge.ok { color: var(--ok); border-color: oklch(56% 0.14 155 / 0.32); }
.badge.ok .lvl { background: var(--ok); }
.badge.warn { color: var(--warn); border-color: oklch(66% 0.14 80 / 0.32); }
.badge.warn .lvl { background: var(--warn); }
.badge.fail { color: var(--danger); border-color: oklch(58% 0.18 25 / 0.32); }
.badge.fail .lvl { background: var(--danger); }
.badge.ghost { background: transparent; }

.contrib { display: flex; align-items: center; gap: 8px; padding: 10px 14px 0; }
.contrib .lab { font: 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); }

.preview-frame {
  margin: 12px 14px 0;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--canvas);
  height: 220px;
  overflow: hidden;
  position: relative;
}
.preview-frame .chrome {
  height: 22px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-2);
}
.preview-frame .chrome .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
.preview-frame .chrome .url {
  flex: 1; text-align: center;
  font: 10px/1 var(--font-mono); color: var(--mute);
}
.preview-frame .stage {
  position: absolute; inset: 22px 0 0;
  display: grid; place-items: center;
  padding: 18px;
}
.preview-frame .stage-inner {
  width: 100%; max-width: 560px;
}
.preview-frame .demo {
  display: flex; flex-direction: column; gap: 12px;
  font-family: var(--font-display);
}
.preview-frame .demo .h {
  font-size: 13px; color: var(--ink-3); margin-bottom: 4px;
}
.preview-frame .demo .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn-demo {
  display: inline-flex; align-items: center; gap: 6px;
  font: 500 13px/1 var(--font-display);
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--glass-2);
  color: var(--ink);
}
.btn-demo.primary {
  background: var(--ink); color: var(--bg);
  border-color: transparent;
}
.btn-demo.accent {
  background: var(--accent); color: oklch(15% 0.02 80);
  border-color: transparent;
}
.btn-demo.danger {
  background: transparent; color: var(--danger);
  border-color: oklch(58% 0.18 25 / 0.4);
}
.btn-demo.sm { padding: 6px 10px; font-size: 12px; border-radius: 6px; }
.btn-demo.lg { padding: 12px 18px; font-size: 14px; border-radius: 10px; }
.btn-demo.ghost { background: transparent; border-color: var(--line); color: var(--ink-2); }

.diff-block {
  margin: 14px 14px 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--canvas);
}
.diff-block .file {
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--glass-2);
  color: var(--ink-2);
}
.diff-block .file .path { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.diff-block .file .ch-add { color: var(--ok); }
.diff-block .file .ch-del { color: var(--danger); }
.diff-block .lines { padding: 6px 0; }
.diff-block .ln {
  display: grid; grid-template-columns: 36px 1fr;
  padding: 1px 0;
}
.diff-block .ln .n { color: var(--mute-2); text-align: right; padding-right: 8px; }
.diff-block .ln .c { padding-right: 12px; white-space: pre; overflow: hidden; text-overflow: ellipsis; }
.diff-block .ln.add { background: oklch(56% 0.14 155 / 0.07); }
.diff-block .ln.add .c { color: var(--ok); }
.diff-block .ln.del { background: oklch(58% 0.18 25 / 0.07); }
.diff-block .ln.del .c { color: var(--danger); }
.diff-block .ln.ctx .c { color: var(--ink-3); }

.tl-card .actions {
  padding: 14px;
  display: flex; gap: 8px; justify-content: flex-end;
  border-top: 1px solid var(--line-soft);
  margin-top: 14px;
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font: 500 13px/1 var(--font-display);
  border: 1px solid var(--line);
  background: var(--glass-2);
  color: var(--ink-2);
  transition: background .15s var(--ease), color .15s var(--ease), border-color .15s var(--ease);
}
.btn:hover { background: var(--glass); color: var(--ink); border-color: var(--line-strong); }
.btn.primary { background: var(--accent); color: oklch(15% 0.02 80); border-color: transparent; }
.btn.primary:hover { background: var(--accent-2); color: oklch(15% 0.02 80); }
.btn.ghost { background: transparent; }
.btn.danger { color: var(--danger); border-color: oklch(58% 0.18 25 / 0.35); }
.btn.opt { background: var(--opt); color: white; border-color: transparent; }
.btn.opt:hover { background: var(--opt-2); }
.btn.sm { padding: 5px 9px; font-size: 12px; border-radius: 6px; }
.btn.icon { padding: 0; width: 28px; height: 28px; display: grid; place-items: center; }

/* A2A review chain */
.a2a {
  margin-top: 8px;
  border: 1px dashed var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px 12px;
  background: var(--glass-3);
}
.a2a .head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  font: 11px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mute);
}
.chain {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
}
.chain .who {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
}
.chain .who .av { width: 24px; height: 24px; border-radius: 7px; font-size: 10px; line-height: 24px; }
.chain .who small { color: var(--mute); font: 11px/1 var(--font-mono); margin-left: 2px; }
.chain .verb {
  display: inline-flex; align-items: center; gap: 6px;
  font: 11px/1 var(--font-mono);
  color: var(--ink-3);
  padding: 5px 9px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--glass-2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.chain .arrow {
  flex: 1; height: 1px; background: linear-gradient(90deg, var(--line-soft), var(--line-strong), var(--line-soft));
  position: relative;
}
.a2a .ask {
  margin-top: 10px;
  padding: 9px 12px;
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  background: var(--glass-2);
  font-size: 13px;
  color: var(--ink-2);
}
.a2a .verdict {
  margin-top: 8px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px;
}
.a2a .verdict .ok { color: var(--ok); }
.a2a .verdict .lvl { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }

/* Optimizer card */
.tl-card.optimizer {
  border-color: oklch(70% 0.18 295 / 0.42);
  background:
    linear-gradient(180deg, oklch(70% 0.18 295 / 0.06), transparent 60%),
    var(--glass);
  position: relative;
}
.tl-card.optimizer .ribbon {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--opt), var(--opt-2), var(--opt));
  opacity: 0.7;
}
.tl-card.optimizer .hd .l .ic-opt {
  width: 22px; height: 22px; border-radius: 7px;
  background: var(--opt-soft);
  display: grid; place-items: center;
  color: var(--opt);
}
.tl-card.optimizer .hd .l .ic-opt svg { width: 12px; height: 12px; }
.tl-card.optimizer .hd .l .ttl { color: var(--opt); }
.tl-card.optimizer .question {
  padding: 14px 16px 4px;
  font: 600 17px/1.35 var(--font-display);
  letter-spacing: -0.01em;
  color: var(--ink);
  text-wrap: balance;
  max-width: 56ch;
}
.tl-card.optimizer .why {
  padding: 8px 16px 4px;
  color: var(--ink-3);
  font-size: 13px;
  max-width: 64ch;
}
.tl-card.optimizer .points {
  padding: 12px 16px 8px;
  display: grid; gap: 6px;
}
.tl-card.optimizer .pt {
  display: grid; grid-template-columns: 14px 1fr auto; gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--glass-2);
  border: 1px solid var(--line-soft);
  font-size: 13px;
}
.tl-card.optimizer .pt .b { width: 6px; height: 6px; border-radius: 50%; background: var(--opt); justify-self: center; }
.tl-card.optimizer .pt .v { font: 600 13px/1 var(--font-mono); color: var(--opt-2); }
.tl-card.optimizer .actions { border-top-color: oklch(70% 0.18 295 / 0.2); }

/* =========================================================
   DOCK
   ========================================================= */
.dock {
  display: grid;
  grid-template-rows: auto 1fr;
  background: var(--glass-3);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  min-width: 0;
  min-height: 0;
}
.dock-tabs {
  display: flex; gap: 2px;
  padding: 8px 8px 0;
  border-bottom: 1px solid var(--line-soft);
}
.dock-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 11px 9px;
  font: 500 12.5px/1 var(--font-display);
  color: var(--mute);
  border-radius: 8px 8px 0 0;
  position: relative;
  border: 1px solid transparent;
  border-bottom: 0;
}
.dock-tab .count {
  font: 10px/1 var(--font-mono);
  background: var(--glass-2);
  color: var(--mute);
  padding: 2px 5px;
  border-radius: 999px;
}
.dock-tab[aria-selected="true"] {
  color: var(--ink);
  background: var(--glass);
  border-color: var(--line);
  border-bottom-color: var(--glass);
  margin-bottom: -1px;
}
.dock-tab[aria-selected="true"] .count { color: var(--accent); background: var(--accent-soft); }
.dock-tab:hover { color: var(--ink); }

.dock-pane {
  overflow: hidden;
  display: none;
  min-height: 0;
}
.dock-pane.on { display: grid; grid-template-rows: 1fr; min-height: 0; }

.dock-scroll { overflow-y: auto; padding: 14px 14px 24px; }
.dock-scroll h4 {
  font: 600 11px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--mute);
  margin: 6px 0 8px;
}

/* Tasks pane */
.task-list { display: grid; gap: 6px; margin-bottom: 16px; }
.task-row {
  display: grid; grid-template-columns: 16px 1fr auto auto; gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--line-soft);
  background: var(--glass-2);
  font-size: 13px;
}
.task-row .cb {
  width: 14px; height: 14px; border-radius: 4px;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
}
.task-row.done .cb { background: var(--ok); border-color: var(--ok); color: oklch(15% 0.02 80); }
.task-row.done .ttl { color: var(--mute); text-decoration: line-through; text-decoration-color: var(--mute-2); text-decoration-thickness: 1px; }
.task-row.running { border-color: var(--ok); }
.task-row.running .cb { border-color: var(--ok); }
.task-row.running .cb::after {
  content: "";
  width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
  animation: pulse 2.2s var(--ease) infinite;
  box-shadow: 0 0 0 0 var(--ok-glow);
}
.task-row.blocked { border-color: oklch(58% 0.18 25 / 0.4); }
.task-row.blocked .cb { border-color: var(--danger); }
.task-row.blocked .cb::after { content: ""; width: 6px; height: 1.5px; background: var(--danger); }
.task-row .ttl { color: var(--ink-2); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.task-row .assn { font: 11px/1 var(--font-mono); color: var(--mute); }
.task-row .when { font: 11px/1 var(--font-mono); color: var(--mute-2); }

/* Graph pane */
.graph-wrap {
  display: grid; grid-template-rows: 1fr auto;
  min-height: 0;
}
.graph {
  position: relative;
  min-height: 360px;
  background:
    linear-gradient(180deg, var(--glass-3), transparent 30%),
    radial-gradient(circle at 50% 40%, var(--glass-2), transparent 70%);
  overflow: hidden;
  border-bottom: 1px solid var(--line-soft);
}
.graph svg.edges {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.graph svg.edges path {
  fill: none;
  stroke: var(--line-strong);
  stroke-width: 1.2;
  stroke-dasharray: 4 3;
}
.graph .node {
  position: absolute;
  transform: translate(-50%, -50%);
  display: grid; grid-template-rows: auto auto;
  gap: 4px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  min-width: 96px;
  text-align: center;
  font-size: 11.5px;
  cursor: pointer;
  transition: transform .15s var(--ease), border-color .15s var(--ease), box-shadow .15s var(--ease);
  z-index: 2;
}
.graph .node:hover, .graph .node.sel {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.graph .node .nt {
  font: 9.5px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mute);
}
.graph .node .nn { font-weight: 600; color: var(--ink); }
.graph .node.task    .nt { color: var(--accent); }
.graph .node.agent   .nt { color: var(--info); }
.graph .node.deliver .nt { color: var(--ok); }
.graph .node.tool    .nt { color: var(--mute); }
.graph .node.review  .nt { color: var(--warn); }
.graph .node.memory  .nt { color: var(--ink-3); }
.graph .node.opt     .nt { color: var(--opt); }

.graph .verb-lab {
  position: absolute;
  transform: translate(-50%, -50%);
  font: 9.5px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mute);
  background: var(--glass-3);
  padding: 3px 6px;
  border-radius: 999px;
  border: 1px solid var(--line-soft);
  pointer-events: none;
  z-index: 1;
}

.graph-detail {
  padding: 12px 14px 14px;
  border-top: 0;
  font-size: 13px;
}
.graph-detail .hd {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.graph-detail .hd .who { font: 600 13px/1 var(--font-display); }
.graph-detail .hd .nt { font: 10px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.12em; text-transform: uppercase; }
.graph-detail .reason {
  display: grid; gap: 7px;
}
.graph-detail .reason .step {
  display: grid; grid-template-columns: 18px 1fr;
  gap: 8px;
  font-size: 12.5px;
  color: var(--ink-2);
}
.graph-detail .reason .step .n {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--glass-2);
  font: 600 10px/18px var(--font-mono);
  text-align: center;
  color: var(--mute);
}
.graph-detail .reason .step.current .n {
  background: var(--accent); color: oklch(15% 0.02 80);
}

/* Deliveries pane */
.deliv-item {
  border: 1px solid var(--line-soft);
  border-radius: 9px;
  padding: 10px 12px;
  display: grid; gap: 6px;
  background: var(--glass-2);
  margin-bottom: 8px;
}
.deliv-item .hd { display: flex; align-items: center; gap: 8px; }
.deliv-item .hd .ttl { font: 600 13px/1.2 var(--font-display); }
.deliv-item .hd .when { font: 11px/1 var(--font-mono); color: var(--mute); margin-left: auto; }
.deliv-item .desc { font-size: 12.5px; color: var(--ink-3); }

/* Memory pane */
.mem-item {
  padding: 9px 11px;
  border-left: 2px solid var(--line);
  background: var(--glass-2);
  margin-bottom: 6px;
  border-radius: 0 8px 8px 0;
  font-size: 12.5px;
  color: var(--ink-2);
}
.mem-item .meta { font: 10px/1 var(--font-mono); color: var(--mute); margin-top: 4px; display: flex; gap: 8px; }
.mem-item.l2 { border-left-color: var(--accent); }
.mem-item.l3 { border-left-color: var(--info); }

/* Activity pane */
.act { display: grid; gap: 4px; }
.act-row {
  display: grid; grid-template-columns: 70px 14px 1fr;
  gap: 10px;
  padding: 5px 0;
  font-size: 12.5px;
  color: var(--ink-2);
}
.act-row .t { font: 11px/1.6 var(--font-mono); color: var(--mute-2); }
.act-row .d { width: 6px; height: 6px; border-radius: 50%; background: var(--mute-2); margin: 6px auto 0; }
.act-row.ok .d { background: var(--ok); }
.act-row.opt .d { background: var(--opt); }
.act-row.warn .d { background: var(--warn); }

/* =========================================================
   AGENT PROFILE
   ========================================================= */
.agent-page {
  padding: 28px 40px 80px;
  max-width: 1100px;
  margin: 0 auto;
}
.agent-head {
  display: grid;
  grid-template-columns: 96px 1fr auto;
  gap: 24px;
  padding: 22px 24px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  box-shadow: var(--shadow-1);
  align-items: center;
}
.agent-head .av-big {
  width: 96px; height: 96px;
  border-radius: 22px;
  background: linear-gradient(135deg, oklch(70% 0.14 200), oklch(58% 0.16 235));
  color: white;
  display: grid; place-items: center;
  font: 600 32px/1 var(--font-display);
  position: relative;
  box-shadow: 0 8px 24px oklch(0% 0 0 / 0.18);
}
.agent-head .av-big .state {
  position: absolute; bottom: -4px; right: -4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--ok);
  border: 3px solid var(--canvas);
  box-shadow: 0 0 0 0 var(--ok-glow);
  animation: pulse 2.2s var(--ease) infinite;
}
.agent-head .name {
  font: 600 24px/1.1 var(--font-display); letter-spacing: -0.015em;
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
}
.agent-head .name .hand { color: var(--mute); font: 500 14px/1 var(--font-mono); }
.agent-head .role { color: var(--ink-3); margin-top: 6px; font-size: 13.5px; }
.agent-head .traits { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.trait {
  font: 11px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 9px; border-radius: 999px;
  background: var(--glass-2); border: 1px solid var(--line-soft);
  color: var(--ink-3);
}
.agent-head .now {
  font-size: 12.5px; color: var(--ink-3);
  border-left: 1px solid var(--line-soft);
  padding-left: 18px;
  align-self: stretch;
  display: grid; align-content: center; gap: 4px;
  min-width: 200px;
}
.agent-head .now .k { font: 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); }
.agent-head .now .v { color: var(--ink); font-size: 13px; }

.trust {
  margin: 18px 0 24px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  display: grid; gap: 12px;
}
.trust .hd { display: flex; justify-content: space-between; align-items: baseline; }
.trust .hd .l { display: flex; align-items: baseline; gap: 10px; }
.trust .hd .l h3 { font: 600 14px/1 var(--font-display); }
.trust .hd .l .sub { font-size: 12.5px; color: var(--mute); }
.trust .hd .r { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.12em; text-transform: uppercase; }
.trust-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--line);
  padding: 0;
}
.trust-bar .seg { background: var(--line); position: relative; transition: background .3s; }
.trust-bar .seg.on { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
.trust-bar .seg.cur::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, oklch(100% 0 0 / 0.4), transparent);
  animation: sweep 2.6s linear infinite;
}
@keyframes sweep {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.trust-stages { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; font-size: 12.5px; }
.trust-stages .st { color: var(--mute); padding-top: 4px; }
.trust-stages .st.on { color: var(--ink); }
.trust-stages .st .lab { font: 600 12.5px/1.2 var(--font-display); }
.trust-stages .st .desc { font-size: 11.5px; color: var(--mute); margin-top: 2px; }
.trust-stages .st.on .desc { color: var(--ink-3); }

.agent-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.panel {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  padding: 16px 18px 18px;
}
.panel .hd { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: baseline; }
.panel .hd h3 { font: 600 14px/1 var(--font-display); }
.panel .hd .meta { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.1em; text-transform: uppercase; }
.panel .item {
  padding: 9px 0;
  border-top: 1px solid var(--line-soft);
  font-size: 13px;
}
.panel .item:first-of-type { border-top: 0; padding-top: 4px; }
.panel .item .ttl { color: var(--ink); font-weight: 500; }
.panel .item .desc { color: var(--ink-3); margin-top: 3px; font-size: 12.5px; }
.panel .item .meta { font: 11px/1 var(--font-mono); color: var(--mute); margin-top: 4px; display: flex; gap: 10px; }

/* =========================================================
   SETTINGS
   ========================================================= */
.settings {
  display: grid;
  grid-template-columns: 230px 1fr;
  height: 100%;
  min-height: 0;
}
.settings-rail {
  border-right: 1px solid var(--line-soft);
  padding: 22px 14px;
  background: var(--glass-3);
}
.settings-rail h4 {
  font: 11px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--mute);
  padding: 6px 10px 8px;
}
.settings-rail a {
  display: block; padding: 7px 10px; border-radius: 7px;
  font-size: 13px; color: var(--ink-2);
}
.settings-rail a:hover { background: var(--glass-2); color: var(--ink); }
.settings-rail a.on { background: var(--accent-soft); color: var(--ink); }
.settings-body { padding: 28px 36px 80px; max-width: 880px; overflow-y: auto; }
.settings-body h2 { font: 600 22px/1.2 var(--font-display); letter-spacing: -0.015em; }
.settings-body p.lede { color: var(--ink-3); margin-top: 4px; }
.settings-body section { margin-top: 28px; }
.settings-body section .stl {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
}
.settings-body section .stl h3 { font: 600 15px/1 var(--font-display); }
.settings-body section .stl .sub { color: var(--mute); font-size: 12.5px; }

.field {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 24px;
  padding: 16px 0;
  border-top: 1px solid var(--line-soft);
  align-items: flex-start;
}
.field:first-of-type { border-top: 0; }
.field .lab { font-weight: 500; color: var(--ink); }
.field .lab small { display: block; color: var(--mute); font-weight: 400; font-size: 12px; margin-top: 3px; }
.field .input { display: grid; gap: 6px; }
.kbox {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--glass-2);
  overflow: hidden;
}
.kbox input {
  padding: 9px 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  min-width: 0;
}
.kbox .pill {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  font: 11px/1 var(--font-mono); color: var(--ok);
}
.kbox .pill .lvl { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 var(--ok-glow); animation: pulse 2.2s var(--ease) infinite; }
.kbox .pill.bad { color: var(--danger); }
.kbox .pill.bad .lvl { background: var(--danger); animation: none; box-shadow: none; }
.kbox .pill.idle { color: var(--mute); }
.kbox .pill.idle .lvl { background: var(--mute-2); animation: none; box-shadow: none; }

select.dd, input.text {
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--glass-2);
  width: 100%;
  font-size: 13px;
}

.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.role-grid .row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--line-soft);
  border-radius: 9px;
  background: var(--glass-2);
}
.role-grid .row .who { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.role-grid .row .who .av { width: 22px; height: 22px; border-radius: 6px; font-size: 9.5px; line-height: 22px; }
.role-grid .row select { padding: 4px 22px 4px 8px; border-radius: 6px; font-size: 12.5px; }

/* Switch */
.switch {
  display: inline-flex;
  width: 38px; height: 22px;
  background: var(--line);
  border-radius: 999px;
  position: relative; cursor: pointer;
  transition: background .15s;
}
.switch::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--canvas);
  box-shadow: 0 1px 3px oklch(0% 0 0 / 0.2);
  transition: transform .2s var(--ease);
}
.switch.on { background: var(--accent); }
.switch.on::after { transform: translateX(16px); }

.sandbox-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  background: var(--glass-2);
  margin-bottom: 8px;
}
.sandbox-card .ttl { font-weight: 500; }
.sandbox-card .desc { color: var(--ink-3); font-size: 12.5px; margin-top: 3px; }
.sandbox-card .allow {
  display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
}
.sandbox-card .allow .chip {
  font: 11px/1 var(--font-mono);
  padding: 4px 8px;
  border-radius: 999px;
  background: var(--glass);
  border: 1px solid var(--line-soft);
  color: var(--ink-3);
}
.sandbox-card .allow .add { color: var(--mute); cursor: pointer; }

/* =========================================================
   MODAL — new project
   ========================================================= */
.modal-veil {
  position: fixed; inset: 0;
  background: oklch(8% 0.02 245 / 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: grid; place-items: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity .2s var(--ease);
}
html[data-theme="light"] .modal-veil { background: oklch(15% 0.02 245 / 0.32); }
.modal-veil.on { opacity: 1; pointer-events: auto; }
.modal {
  width: min(640px, calc(100vw - 32px));
  max-height: calc(100vh - 64px);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  box-shadow: 0 30px 80px oklch(0% 0 0 / 0.45);
  overflow: hidden;
  transform: translateY(8px) scale(0.98);
  transition: transform .25s var(--ease);
  display: grid; grid-template-rows: auto 1fr auto;
  max-height: calc(100vh - 80px);
}
.modal-veil.on .modal { transform: translateY(0) scale(1); }
.modal .mhd {
  padding: 16px 20px 14px;
  display: grid; gap: 8px;
  border-bottom: 1px solid var(--line-soft);
}
.modal .mhd .row1 { display: flex; align-items: center; justify-content: space-between; }
.modal .mhd .row1 h3 { font: 600 17px/1.2 var(--font-display); letter-spacing: -0.01em; }
.modal .mhd .row1 .x {
  width: 28px; height: 28px; border-radius: 7px;
  display: grid; place-items: center;
  color: var(--mute);
  border: 1px solid var(--line);
}
.modal .mhd .row1 .x:hover { color: var(--ink); background: var(--glass-2); }
.modal .mhd .steps { display: flex; gap: 6px; align-items: center; font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.1em; text-transform: uppercase; }
.modal .mhd .steps .pip { width: 22px; height: 3px; background: var(--line); border-radius: 2px; }
.modal .mhd .steps .pip.on { background: var(--accent); }

.modal .mb { padding: 18px 20px 14px; overflow-y: auto; }
.modal .mft {
  padding: 12px 20px;
  border-top: 1px solid var(--line-soft);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--glass-3);
}
.modal .mft .hint { font: 11px/1.4 var(--font-mono); color: var(--mute); }
.modal .mft .acts { display: flex; gap: 8px; }

.kind-grid {
  display: grid; gap: 10px;
  grid-template-columns: repeat(3, 1fr);
}
.kind-card {
  padding: 16px 14px 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--glass-2);
  cursor: pointer;
  display: grid; gap: 6px;
  text-align: left;
  transition: border-color .15s, background .15s;
}
.kind-card:hover { border-color: var(--line-strong); background: var(--glass); }
.kind-card.on { border-color: var(--accent); background: var(--accent-soft); }
.kind-card .ic {
  width: 30px; height: 30px;
  border-radius: 9px;
  background: var(--glass-2);
  border: 1px solid var(--line);
  display: grid; place-items: center;
  color: var(--ink-3);
  margin-bottom: 4px;
}
.kind-card.on .ic { background: oklch(100% 0 0 / 0.4); border-color: var(--accent); color: var(--accent); }
.kind-card .ttl { font: 600 14px/1 var(--font-display); }
.kind-card .desc { color: var(--ink-3); font-size: 12px; line-height: 1.5; }

.form-grid { display: grid; gap: 14px; }
.form-row { display: grid; gap: 6px; }
.form-row label { font: 500 12.5px/1 var(--font-display); }
.form-row label small { color: var(--mute); font-weight: 400; }
.form-row input.text, .form-row textarea {
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--glass-2);
  font-size: 13.5px;
  width: 100%;
  resize: vertical;
}
.form-row textarea { min-height: 60px; font-family: var(--font-body); }

.stage-pick { display: flex; gap: 6px; flex-wrap: wrap; }
.stage-pick .chip {
  padding: 6px 11px; border-radius: 999px;
  border: 1px solid var(--line);
  font: 11px/1 var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
}
.stage-pick .chip.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }

.agent-pick { display: grid; gap: 6px; }
.agent-pick .row {
  display: grid; grid-template-columns: 18px 28px 1fr auto; gap: 10px;
  align-items: center;
  padding: 7px 9px;
  border-radius: 8px;
  border: 1px solid var(--line-soft);
  background: var(--glass-2);
  cursor: pointer;
}
.agent-pick .row.on { border-color: var(--accent); background: var(--accent-soft); }
.agent-pick .row .cb { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--line-strong); }
.agent-pick .row.on .cb { background: var(--accent); border-color: var(--accent); display: grid; place-items: center; color: oklch(15% 0.02 80); }
.agent-pick .row .av { width: 24px; height: 24px; border-radius: 7px; font-size: 10px; line-height: 24px; }
.agent-pick .row .who { font-size: 13px; }
.agent-pick .row .who small { font: 11px/1 var(--font-mono); color: var(--mute); display: block; margin-top: 3px; }
.agent-pick .row .rec { font: 10px/1 var(--font-mono); color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }

/* =========================================================
   EXTENSIONS — plugins page + integrations page
   ========================================================= */
.ext { padding: 28px 36px 80px; max-width: 1080px; }
.ext-head { display: grid; grid-template-columns: 1fr auto; gap: 12px 20px; align-items: end; padding-bottom: 18px; border-bottom: 1px solid var(--line-soft); }
.ext-head .crumb { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
.ext-head h2 { font: 600 26px/1.15 var(--font-display); letter-spacing: -0.018em; color: var(--ink); }
.ext-head .lede { color: var(--ink-3); margin-top: 6px; max-width: 56ch; font-size: 13.5px; line-height: 1.55; }
.ext-head .acts { display: flex; gap: 8px; align-items: center; }

.ext-kpi {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  box-shadow: var(--shadow-1);
  padding: 16px 0;
  margin-top: 22px;
}
.ext-kpi .it { display: grid; gap: 6px; padding: 0 22px; border-right: 1px solid var(--line-soft); }
.ext-kpi .it:last-child { border-right: 0; }
.ext-kpi .val { font: 600 26px/1 var(--font-display); letter-spacing: -0.02em; color: var(--ink); font-variant-numeric: tabular-nums; }
.ext-kpi .lab { font: 10.5px/1 var(--font-mono); letter-spacing: 0.16em; text-transform: uppercase; color: var(--mute); }
.ext-kpi .it .sub { font-size: 12px; color: var(--ink-3); }

.ext-tabs {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px;
  margin-top: 22px; padding: 5px;
  border: 1px solid var(--line); border-radius: 12px;
  background: var(--glass-2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.ext-tab {
  appearance: none; -webkit-appearance: none;
  padding: 11px 16px; border: 0; background: transparent; cursor: pointer;
  border-radius: 8px;
  display: grid; gap: 4px; text-align: left;
  color: var(--ink-2);
  transition: background .18s var(--ease), color .18s var(--ease), box-shadow .18s var(--ease);
}
.ext-tab .nm { font: 600 13px/1.1 var(--font-display); }
.ext-tab .meta { font: 10.5px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.08em; }
.ext-tab:hover:not([aria-selected="true"]) { color: var(--ink); background: var(--glass-3); }
.ext-tab[aria-selected="true"] { background: var(--bg); box-shadow: var(--shadow-1); color: var(--ink); }
.ext-tab[aria-selected="true"] .meta { color: var(--ink-3); }
.ext-tab[data-disabled="true"] { cursor: not-allowed; color: var(--mute); }
.ext-tab[data-disabled="true"] .meta { color: var(--mute-2); }

.ext-pane { display: none; }
.ext-pane.on { display: block; }

.ext-section { margin-top: 24px; }
.ext-section .stl { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.ext-section .stl h3 { font: 600 14.5px/1.2 var(--font-display); color: var(--ink); }
.ext-section .stl .sub { font-size: 12.5px; color: var(--mute); }
.ext-section .stl .more { margin-left: auto; font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.08em; }

/* Plugin cards */
.plugin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.plugin-card {
  position: relative; display: grid;
  grid-template-columns: 38px 1fr auto;
  grid-template-rows: auto auto auto;
  column-gap: 14px; row-gap: 6px;
  padding: 16px 18px 14px;
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  box-shadow: var(--shadow-1);
  transition: border-color .22s var(--ease), transform .22s var(--ease), box-shadow .22s var(--ease);
}
.plugin-card:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-2); }
.plugin-card .ic-tile {
  grid-row: 1 / span 2; align-self: start;
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--glass-3);
  display: grid; place-items: center;
  color: var(--ink-2);
}
.plugin-card .ic-tile svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.plugin-card .ttl { font: 600 14px/1.2 var(--font-display); color: var(--ink); }
.plugin-card .v { font: 10.5px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.06em; align-self: center; }
.plugin-card .desc { grid-column: 2 / span 2; font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }
.plugin-card .foot {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 10px;
  margin-top: 6px; padding-top: 10px;
  border-top: 1px dashed var(--line-soft);
  font: 11px/1 var(--font-mono); color: var(--mute);
  letter-spacing: 0.06em;
}
.plugin-card .crew { display: flex; align-items: center; }
.plugin-card .crew .av { width: 18px; height: 18px; font-size: 8px; line-height: 18px; border-radius: 50%; }
.plugin-card .crew .av + .av { margin-left: -6px; }
.plugin-card .src { color: var(--ink-3); }
.plugin-card .links { margin-left: auto; display: flex; gap: 4px; }
.plugin-card .lnk {
  border: 0; background: transparent; cursor: pointer;
  font: 11px/1 var(--font-mono); color: var(--ink-3); letter-spacing: 0.06em;
  padding: 5px 9px; border-radius: 6px;
  transition: background .18s var(--ease), color .18s var(--ease);
}
.plugin-card .lnk:hover { background: var(--glass-2); color: var(--ink); }
.plugin-card .lnk.danger:hover { color: var(--danger); }
.plugin-card[data-state="installed"] .ic-tile { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.plugin-card[data-state="available"] .ic-tile { background: var(--glass-3); color: var(--ink-3); }
.plugin-card[data-state="installed"]::before {
  content: ''; position: absolute; top: 14px; right: 16px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 12px 0 var(--accent-soft);
}

/* Source rows (plugin source registries) */
.src-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.src-card {
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass); padding: 14px 16px;
  display: grid; gap: 8px;
}
.src-card .top { display: flex; align-items: center; justify-content: space-between; }
.src-card .nm { font: 600 13.5px/1 var(--font-display); color: var(--ink); }
.src-card .url { font: 11px/1.4 var(--font-mono); color: var(--ink-3); word-break: break-all; }
.src-card .meta { font: 11px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.06em; }

/* Alert banner (forwarded / sandbox warning style) */
.alert {
  display: grid; grid-template-columns: 26px 1fr; gap: 12px;
  align-items: start;
  padding: 12px 14px;
  border: 1px solid var(--line); border-radius: 10px;
  background: var(--glass-2);
  color: var(--ink-3);
  font-size: 12.5px; line-height: 1.55;
  margin-top: 18px;
}
.alert .ic-tile { width: 26px; height: 26px; border-radius: 8px; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; border: 1px solid var(--accent); }
.alert .ic-tile svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.alert .ln + .ln { margin-top: 6px; }
.alert strong { color: var(--ink); font-weight: 600; }
.alert code, .alert .mono { font: 11.5px/1.4 var(--font-mono); color: var(--ink-2); background: var(--glass-3); padding: 1.5px 6px; border-radius: 4px; border: 1px solid var(--line-soft); }

/* MCP / connectors / use-anywhere */
.mcp-list {
  margin-top: 18px;
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass);
  overflow: hidden;
}
.mcp-row {
  display: grid;
  grid-template-columns: 22px 1.2fr auto auto auto auto auto;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  border-top: 1px solid var(--line-soft);
  font-size: 13px;
}
.mcp-row:first-child { border-top: 0; }
.mcp-row .cb {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--line-strong); background: transparent;
  display: grid; place-items: center; cursor: pointer;
  transition: background .15s var(--ease), border-color .15s var(--ease);
}
.mcp-row .cb.on { background: var(--accent); border-color: var(--accent); }
.mcp-row .cb.on::before { content: ''; width: 9px; height: 5px; border-left: 1.6px solid #fff; border-bottom: 1.6px solid #fff; transform: translateY(-1.5px) rotate(-45deg); display: block; }
.mcp-row .nm { font-weight: 500; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.mcp-row .nm .pkg { font: 10.5px/1 var(--font-mono); color: var(--mute); letter-spacing: 0.06em; padding: 3px 6px; border: 1px solid var(--line-soft); border-radius: 4px; }
.mcp-row .tag {
  font: 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 7px; border-radius: 5px;
  border: 1px solid var(--line-soft);
  background: var(--glass-3); color: var(--ink-3);
}
.mcp-row .tag.stdio { color: var(--ok); border-color: oklch(56% 0.14 155 / 0.4); background: oklch(56% 0.14 155 / 0.10); }
.mcp-row .tag.http  { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.mcp-row .tag.sse   { color: var(--opt); border-color: oklch(56% 0.18 295 / 0.4); background: oklch(56% 0.18 295 / 0.10); }
.mcp-row .count { font: 11.5px/1 var(--font-mono); color: var(--ink-3); white-space: nowrap; }
.mcp-row .stat { font: 11px/1 var(--font-mono); color: var(--ink-3); display: inline-flex; align-items: center; }
.mcp-row .stat .lvl { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); margin-right: 6px; box-shadow: 0 0 0 0 oklch(56% 0.14 155 / 0.4); animation: pulse 2.2s var(--ease) infinite; }
.mcp-row .stat.warn { color: var(--accent); }
.mcp-row .stat.warn .lvl { background: var(--accent); box-shadow: 0 0 0 0 var(--accent-soft); animation: pulse 2.2s var(--ease) infinite; }
.mcp-row .stat.idle { color: var(--mute); }
.mcp-row .stat.idle .lvl { background: var(--mute-2); animation: none; box-shadow: none; }
.mcp-row .more { color: var(--mute); border: 0; background: transparent; cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 14px; line-height: 1; }
.mcp-row .more:hover { background: var(--glass-2); color: var(--ink); }
.mcp-row[data-state="off"] .nm,
.mcp-row[data-state="off"] .count,
.mcp-row[data-state="off"] .tag { opacity: 0.45; }

.mcp-foot {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px; flex-wrap: wrap;
}
.mcp-foot .path { margin-left: auto; font: 11px/1 var(--font-mono); color: var(--mute); }
.mcp-foot .path code { color: var(--ink-2); padding: 4px 8px; border-radius: 5px; background: var(--glass-2); border: 1px solid var(--line-soft); }

/* Connectors grid */
.conn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.conn-card {
  display: grid; grid-template-columns: 32px 1fr auto;
  align-items: center; gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass);
}
.conn-card .ic {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--glass-3); display: grid; place-items: center;
  border: 1px solid var(--line-soft); color: var(--ink-2);
}
.conn-card .ic svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.conn-card .body { min-width: 0; }
.conn-card .nm { font: 600 13px/1.2 var(--font-display); color: var(--ink); }
.conn-card .desc { font: 11px/1.4 var(--font-mono); color: var(--mute); letter-spacing: 0.04em; margin-top: 2px; word-break: break-word; }
.conn-card .swm {
  width: 32px; height: 18px; border-radius: 999px;
  background: var(--glass-3); border: 1px solid var(--line);
  position: relative; cursor: pointer;
  transition: background .18s var(--ease), border-color .18s var(--ease);
}
.conn-card .swm::after { content: ''; position: absolute; top: 1.5px; left: 1.5px; width: 13px; height: 13px; border-radius: 50%; background: var(--mute); transition: left .22s var(--ease), background .22s var(--ease); }
.conn-card[data-on="true"] .swm { background: var(--accent); border-color: var(--accent); }
.conn-card[data-on="true"] .swm::after { left: 16px; background: oklch(98% 0 0); }
.conn-card[data-on="true"] .ic { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

/* Use-anywhere grid */
.ua-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.ua-card {
  display: grid; gap: 10px;
  padding: 16px;
  border: 1px solid var(--line); border-radius: var(--r-md);
  background: var(--glass);
}
.ua-card .top { display: flex; align-items: center; gap: 10px; }
.ua-card .ic {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid var(--accent);
  display: grid; place-items: center;
}
.ua-card .ic svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.ua-card h4 { font: 600 13.5px/1 var(--font-display); color: var(--ink); }
.ua-card .desc { font-size: 12px; color: var(--ink-3); line-height: 1.5; }
.ua-card pre {
  font: 11.5px/1.6 var(--font-mono);
  background: var(--glass-3);
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--ink-2);
  overflow-x: auto;
  margin: 0;
  white-space: pre;
}
.ua-card pre .k { color: var(--accent); }
